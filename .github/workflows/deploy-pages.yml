name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository and Git LFS assets
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify audio assets are hydrated
        shell: bash
        run: |
          if grep -RIl --include='*.mp3' '^version https://git-lfs.github.com/spec/v1' docs; then
            echo 'Git LFS pointer files remain in the Pages artifact.' >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Build TypeScript projects
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
