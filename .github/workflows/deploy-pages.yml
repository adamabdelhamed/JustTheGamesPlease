name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository and Git LFS assets
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Verify audio assets are hydrated
        shell: bash
        run: |
          if grep -RIl --include='*.mp3' '^version https://git-lfs.github.com/spec/v1' docs; then
            echo 'Git LFS pointer files remain in the Pages artifact.' >&2
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload site
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
