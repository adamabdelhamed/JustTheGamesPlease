<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Neon Swarm · Shield Family Test</title>
  <meta name="theme-color" content="#05071c">
  <script src="../../../lib/url-options.js"></script>
  <script src="../../../lib/analytics.js"></script>
  <link rel="stylesheet" href="../../../lib/top-bar/top-bar.css">
  <link rel="stylesheet" href="../../../lib/controller/controller.css">
  <link rel="stylesheet" href="../gun-family/manual.css">
  <link rel="stylesheet" href="manual.css">
</head>
<body>
  <main id="game" aria-label="Shield family lane runner test page">
    <canvas id="game-canvas"></canvas>
    <header data-game-topbar data-contained>
      <div class="game-topbar__identity">
        <h1>SHIELD FAMILY <b>LAB</b></h1>
        <p class="game-topbar__instructions" id="status">Tap a side to switch lanes. Enemies approach from above.</p>
      </div>
      <div class="game-topbar__right">
        <div class="game-topbar__controls">
          <span id="weapon-readout">Loading…</span>
          <span id="score-readout">Kills 0</span>
        </div>
        <div class="game-topbar__utilities" data-game-topbar-utilities></div>
      </div>
    </header>
    <aside class="lab-panel" aria-label="Manual test controls">
      <h2>Manual controls</h2>
      <label>Shield
        <select id="shield-select"></select>
      </label>
      <label>Enemy HP
        <input id="enemy-hp" type="number" min="0.25" max="100" step="0.25" value="1">
      </label>
      <div class="strength-readout" aria-live="polite">
        <span>Shield strength</span>
        <strong id="shield-strength">—</strong>
      </div>
      <div class="button-row">
        <button type="button" data-spawn-enemy="0">Enemy left</button>
        <button type="button" data-spawn-enemy="1">Enemy right</button>
      </div>
      <div class="button-row">
        <button type="button" data-spawn-pickup="0">Shield pickup left</button>
        <button type="button" data-spawn-pickup="1">Shield pickup right</button>
      </div>
      <div class="button-row">
        <button type="button" id="spawn-wave">Spawn wave</button>
        <button type="button" id="clear-stage">Clear stage</button>
      </div>
      <dl id="spec-readout"></dl>
      <p class="spec-note">Balance comes from <code>ShieldFamily.ts</code>. All shields use the same strength-pool behavior.</p>
    </aside>
    <div id="joystick" aria-hidden="true"><span class="stick-ring"></span><span class="stick-knob"></span></div>
    <section id="error" role="alert" hidden></section>
  </main>
  <script src="../../../lib/top-bar/top-bar.js"></script>
  <script src="../../../lib/audio/audio.js"></script>
  <script src="../../../lib/controller/controller.js"></script>
  <script>
    gameAudio.preload([
      '../../../../audio/PickupShield',
      '../../../../audio/Shield',
      '../../../../audio/ShieldImpact',
      '../../../../audio/ShieldBreak',
      '../../../../audio/EnemyDestroyed',
      '../../../../audio/EnemyDestroyed_Alt1',
      '../../../../audio/EnemyDestroyed_Alt2'
    ]);
  </script>
  <script type="module" src="manual.js"></script>
</body>
</html>
