<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Neon Swarm · Tracks</title>
  <meta name="theme-color" content="#05071c">
  <script src="lib/url-options.js"></script>
  <script src="lib/analytics.js"></script>
  <link rel="stylesheet" href="lib/top-bar/top-bar.css">
  <link rel="stylesheet" href="lib/controller/controller.css">
  <link rel="stylesheet" href="NeonSwarm/game.css">
</head>
<body>
  <main id="game">
    <canvas id="game-canvas"></canvas>
    <header data-game-topbar data-contained>
      <div class="game-topbar__identity">
        <h1>NEON <b>SWARM</b></h1>
        <p class="game-topbar__instructions" id="status">Choose a track. Tap either side to switch lanes; use the joystick to fine aim.</p>
      </div>
      <div class="game-topbar__right">
        <div class="game-topbar__controls"><span id="run-status"></span></div>
        <div class="game-topbar__utilities" data-game-topbar-utilities></div>
      </div>
    </header>
    <section id="camera-lab" class="camera-lab" aria-label="Temporary camera controls" hidden>
      <label>Height <input id="camera-height" type="range" min="90" max="620" step="5"></label>
      <label>Look <input id="camera-look" type="range" min="18" max="72" step="1"></label>
      <label>Back <input id="camera-back" type="range" min="20" max="360" step="5"></label>
      <label>Zoom <input id="camera-zoom" type="range" min="0.55" max="1.8" step="0.01"></label>
      <label>Horizon <input id="camera-horizon" type="range" min="0.18" max="0.72" step="0.01"></label>
      <button id="camera-output" type="button">Output</button>
      <output id="camera-output-text" for="camera-height camera-look camera-back camera-zoom camera-horizon"></output>
    </section>
    <section id="scene-lab" class="scene-lab" aria-label="Temporary scene controls" hidden>
      <label>Scene <select id="scene-select"></select></label>
    </section>
    <section id="track-select" class="track-select">
      <span class="eyebrow">SELECT TRACK</span>
      <h2>Choose your run</h2>
      <div id="track-list"></div>
      <p id="developer-tools" class="developer-tools" hidden><a href="NeonSwarm/tests/index.html#dev-1">Open Test Center</a></p>
    </section>
    <section id="result" class="result" hidden><h2 id="result-title"></h2><p id="result-detail"></p><button id="back-to-tracks">Tracks</button></section>
    <div id="joystick" aria-hidden="true"><span class="stick-ring"></span><span class="stick-knob"></span></div>
    <section id="error" role="alert" hidden></section>
  </main>
  <script src="lib/top-bar/top-bar.js"></script>
  <script src="lib/audio/audio.js"></script>
  <script>
    gameAudio.preload([
      'Primary','Primary_Alt1','Primary_Alt2','Primary_Alt3',
      'NeedlerFire','NeedlerFire_Alt1','NeedlerFire_Alt2','NeedlerFire_Alt3',
      'BurstCarbineFire','BurstCarbineFire_Alt1','BurstCarbineFire_Alt2','BurstCarbineFire_Alt3',
      'HeavyCannonFire','HeavyCannonFire_Alt1','HeavyCannonFire_Alt2','HeavyCannonFire_Alt3',
      'SplitterRifleFire','SplitterRifleFire_Alt1','SplitterRifleFire_Alt2','SplitterRifleFire_Alt3',
      'ProjectileHit','ProjectileHit_Alt1','ProjectileHit_Alt2','ProjectileHit_Alt3',
      'EnemySpawn','EnemySpawn_Alt1','EnemySpawn_Alt2','EnemySpawn_Alt3',
      'EnemyHit','EnemyHit_Alt1','EnemyHit_Alt2','EnemyHit_Alt3',
      'EnemyDestroyed','EnemyDestroyed_Alt1','EnemyDestroyed_Alt2','EnemyDestroyed_Alt3',
      'PlayerDamage','PlayerDamage_Alt1','PlayerDamage_Alt2','PlayerDamage_Alt3',
      'SquadMemberLost','SquadMemberLost_Alt1','SquadMemberLost_Alt2','SquadMemberLost_Alt3',
      'LaneSwitch','LaneSwitch_Alt1','LaneSwitch_Alt2','LaneSwitch_Alt3',
      'Pickup','Pickup_Alt1','Pickup_Alt2','Pickup_Alt3',
      'PickupGun','PickupGun_Alt1','PickupGun_Alt2','PickupGun_Alt3',
      'PickupShield','PickupShield_Alt1','PickupShield_Alt2','PickupShield_Alt3',
      'PickupSword','PickupSword_Alt1','PickupSword_Alt2','PickupSword_Alt3',
      'PickupMultiplier','PickupMultiplier_Alt1','PickupMultiplier_Alt2','PickupMultiplier_Alt3',
      'ShieldImpact','ShieldImpact_Alt1','ShieldImpact_Alt2','ShieldImpact_Alt3',
      'ShieldPulse','ShieldPulse_Alt1','ShieldPulse_Alt2','ShieldPulse_Alt3',
      'SwordSwing','SwordSwing_Alt1','SwordSwing_Alt2','SwordSwing_Alt3',
      'SwordHeavySwing','SwordHeavySwing_Alt1','SwordHeavySwing_Alt2','SwordHeavySwing_Alt3',
      'SwordStab','SwordStab_Alt1','SwordStab_Alt2','SwordStab_Alt3',
      'SwordHit','SwordHit_Alt1','SwordHit_Alt2','SwordHit_Alt3',
      'AimRelease','EnemyEscaped','GameOver','LowHealthWarning','MenuOpen','PuzzleComplete','Shield','TrackStart','WeaponReady'
    ]);
    gameAudio.playSharedMusic(['Music']);
  </script>
  <script src="lib/controller/controller.js"></script>
  <script type="module" src="NeonSwarm/game.js"></script>
</body>
</html>
