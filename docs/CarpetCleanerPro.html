<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Carpet Cleaner Pro</title>
  <meta name="theme-color" content="#09100e">
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
        "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.webgpu.js",
        "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.tsl.js"
      }
    }
  </script>
  <script src="lib/analytics.js"></script>
  <link rel="stylesheet" href="lib/top-bar/top-bar.css?v=20260618-2">
  <link rel="stylesheet" href="CarpetCleanerPro/game.css">
</head>
<body>
  <main id="game" aria-label="Carpet Cleaner Pro game area">
    <canvas id="scene" aria-label="WebGPU diagnostic scene"></canvas>
    <header data-game-topbar data-contained data-mobile-compact>
      <div class="game-topbar__identity">
        <h1>CARPET CLEANER <b>PRO</b></h1>
        <p class="game-topbar__instructions">A next-generation cleaning simulation is under construction.</p>
      </div>
      <div class="game-topbar__right"><div class="game-topbar__utilities" data-game-topbar-utilities></div></div>
    </header>
    <section class="placeholder" id="statusCard" aria-live="polite">
      <span class="eyebrow">WEBGPU SIMULATION LAB</span>
      <h2>Deep clean.<br><b>Down to every fiber.</b></h2>
      <p id="capability">Checking GPU capabilities…</p>
      <div class="pipeline" aria-label="Planned simulation pipeline">
        <span>Fiber</span><i></i><span>Fluid</span><i></i><span>Drain</span>
      </div>
      <strong>IN DEVELOPMENT</strong>
    </section>
    <aside class="diagnostics" id="diagnostics" hidden aria-label="Developer diagnostics">
      <div><b>WEBGPU DIAGNOSTICS</b><span id="diagStatus">STARTING</span></div>
      <dl id="diagValues"></dl>
      <div class="simulation-controls">
        <button type="button" id="simPause">PAUSE</button>
        <button type="button" id="simStep">STEP</button>
        <button type="button" id="simReset">RESET</button>
        <button type="button" id="simTest">TEST 30/60/120</button>
        <button type="button" id="geometryDiagnostics" aria-pressed="false">WORLD OVERLAY</button>
      </div>
      <label class="render-cap">Render cap
        <select id="renderCap"><option value="0">Display</option><option value="30">30 FPS</option><option value="60">60 FPS</option><option value="120">120 FPS</option></select>
      </label>
      <label class="render-cap">Material field
        <select id="materialField"><option value="">Off</option><option value="surfaceMask">Surface mask</option><option value="freeWater">Free water</option><option value="carpetSaturation">Carpet saturation</option><option value="embeddedSoil">Embedded soil</option><option value="looseSoil">Loose soil</option><option value="dissolvedSoil">Dissolved soil</option><option value="sediment">Sediment</option><option value="soap">Soap</option><option value="foam">Foam</option><option value="velocity">Velocity</option></select>
      </label>
      <label class="render-cap">World seed
        <select id="worldSeed"><option value="1831565813">Seed A</option><option value="305419896">Seed B</option></select>
      </label>
    </aside>
  </main>
  <script src="lib/top-bar/top-bar.js?v=20260618-2"></script>
  <script src="lib/audio/audio.js?v=20260618-2"></script>
  <script type="module" src="CarpetCleanerPro/src/main.js?v=20260622-1"></script>
</body>
</html>
