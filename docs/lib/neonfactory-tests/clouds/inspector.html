<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NeonFactory - Cloud Inspector</title><link rel="stylesheet" href="clouds.css"></head><body><main><header><div><span>NEONFACTORY - WEBGPU VOLUME LAB</span><h1>Cloud Inspector</h1><p>Click the stage to reposition the burst. Tune the explosion envelope and copy exact JSON settings.</p></div><output id="test-status">BOOTING</output></header><nav><a href="gallery.html">Cloud suite</a><a class="active" href="inspector.html">Cloud inspector</a><a href="../shapes/inspector.html">Shape inspector</a></nav><section class="layout"><div class="stage-wrap"><canvas id="stage"></canvas></div><aside class="panel"><details open><summary>Shape</summary><fieldset><label>Size<input id="size" type="range" min="30" max="420" value="180"></label><label>Detail<input id="detail" type="range" min="1" max="7" value="5"></label><label>Turbulence<input id="turbulence" type="range" min="0" max="300" value="95"></label></fieldset></details><details open><summary>Neon core</summary><fieldset><label>Color<input id="color" type="color" value="#63e8ff"></label><label>Glow<input id="glow" type="range" min="0" max="900" value="520"></label><label>Core intensity<input id="core-intensity" type="range" min="0" max="300" value="165"></label><label>Rim intensity<input id="rim-intensity" type="range" min="0" max="220" value="105"></label><label>Opacity<input id="opacity" type="range" min="0" max="100" value="100"></label></fieldset></details><details open><summary>Explosion envelope</summary><fieldset><label>Entry seconds<input id="entry-time" type="range" min="1" max="120" value="9"></label><label>Entry punch<input id="entry-punch" type="range" min="0" max="300" value="180"></label><label>Sustain seconds<input id="sustain-time" type="range" min="0" max="500" value="18"></label><label>Sustain level<input id="sustain-level" type="range" min="0" max="120" value="82"></label><label>Fade seconds<input id="fade-time" type="range" min="5" max="300" value="65"></label><label>Spark intensity<input id="spark-intensity" type="range" min="0" max="300" value="150"></label><label>Drift X<input id="drift-x" type="range" min="-160" max="160" value="0"></label><label>Drift Y<input id="drift-y" type="range" min="-160" max="160" value="-18"></label></fieldset></details><button id="run">Run</button><button id="copy">Copy Settings JSON</button><label>Settings JSON<textarea id="json" readonly></textarea></label><p class="readout" id="readout"></p></aside></section><div id="error" hidden></div></main><script type="module" src="inspector.js"></script></body></html>
