<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NeonFactory · Projectile Lab</title><link rel="stylesheet" href="projectiles.css"></head><body><main><header><div><span>NEONFACTORY · TOP-DOWN SCENE</span><h1>Projectile Lab</h1><p>Reusable kinematic projectiles rendered through the same scene API as games.</p></div><output id="test-status">BOOTING</output></header><nav><a href="../index.html">Test index</a></nav><section><canvas id="stage"></canvas><aside><label>Shape<select id="shape"><option>dart</option><option>needle</option><option>slug</option><option>splitBolt</option></select></label><label>Speed<input id="speed" type="range" min="50" max="900" value="520"></label><label>Radius<input id="radius" type="range" min="1" max="10" value="3"></label><label>Length<input id="length" type="range" min="3" max="30" value="10"></label><label>Trail<input id="trail" type="range" min="0" max="60" value="18"></label><label>Color<select id="color"><option value="#55e7ff">Cyan</option><option value="#ff4f9a">Pink</option><option value="#7fffc2">Green</option><option value="#ffd45c">Gold</option><option value="#a987ff">Violet</option></select></label><button id="fire">Fire volley</button></aside></section><div id="error" hidden></div></main><script type="module" src="projectiles.js"></script></body></html>
