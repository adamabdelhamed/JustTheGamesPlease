<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NeonFactory · Shape Inspector</title><link rel="stylesheet" href="shapes.css"><link rel="stylesheet" href="/lib/controller/controller.css"></head>
<body><main><header><div><span>NEONFACTORY · WEBGPU LAB</span><h1 id="title">Shape Inspector</h1><p>Drag to rock. Click the stage to aim an impact vector.</p></div><output id="test-status">BOOTING</output></header>
<nav><a href="gallery.html">Full suite</a><a class="active" href="inspector.html">Shape inspector</a></nav>
<section class="inspector"><div class="stage-wrap"><canvas id="stage"></canvas><div id="impact-vector"></div></div><aside>
<details open><summary>Shape and rendering</summary><fieldset><label>Shape<select id="shape"></select></label>
<label>Zoom<input id="zoom" type="range" min="10" max="60" value="21"></label><label>Depth<input id="depth" type="range" min="0" max="8" value="6"></label><label>Line thickness<input id="thickness" type="range" min="20" max="220" value="54"></label>
<label>Energy intensity<input id="intensity" type="range" min="0" max="250" value="110"></label><label>Energy coverage<input id="coverage" type="range" min="0" max="100" value="32"></label><label>Energy speed<input id="speed" type="range" min="0" max="250" value="79"></label><label>Center bleed<input id="bleed" type="range" min="0" max="100" value="35"></label></fieldset></details>
<details open><summary>Optional label</summary><fieldset><label>Text<input id="label-text" type="text" placeholder="ENEMY"></label><label>Position<select id="label-position"><option>above</option><option>below</option><option>left</option><option>right</option><option>center</option></select></label><label>Offset distance<input id="label-offset" type="range" min="-20" max="100" value="8"></label><label>Font<select id="label-font"><option value="Segoe UI, sans-serif">Segoe UI</option><option value="monospace">Monospace</option><option value="Arial Black, sans-serif">Arial Black</option><option value="Georgia, serif">Georgia</option></select></label><label>Size<input id="label-size" type="range" min="8" max="48" value="18"></label></fieldset></details>
<details><summary>Movement</summary><fieldset><label>X velocity<input id="velocity-x" type="range" min="-50" max="50" value="0"></label><label>Y velocity<input id="velocity-y" type="range" min="-50" max="50" value="0"></label><button id="stop-movement">Stop movement</button></fieldset></details>
<details><summary>Impact</summary><fieldset><p class="hint">Click the stage to aim the incoming vector.</p><label>Magnitude<input id="impact-magnitude" type="range" min="25" max="300" value="100"></label><button id="impact">Trigger impact</button></fieldset></details>
<details><summary>Disposal</summary><fieldset><select id="disposal"><option value="fadeOut">FadeOut</option><option value="disappear">Disappear</option><option value="explode">Explode</option></select><label>Explosion magnitude<input id="explode-magnitude" type="range" min="10" max="150" value="55"></label><button id="dispose">Trigger disposal</button></fieldset></details>
<label>Shape notes<textarea id="notes" rows="5" placeholder="Targeted changes for this shape…"></textarea></label><label>Auto rock<input id="auto" type="checkbox" checked></label><button id="reset">Reset view</button><button id="export">Export Tunings</button><p id="readout"></p>
</aside></section><div id="stick"><i></i></div><div id="error" hidden></div></main><script src="/lib/controller/controller.js"></script><script type="module" src="inspector.js"></script></body></html>
