<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Neon Swarm · Tracks</title>
  <meta name="theme-color" content="#05071c">
  <script src="lib/url-options.js"></script>
  <script src="lib/analytics.js"></script>
  <link rel="stylesheet" href="lib/top-bar/top-bar.css">
  <link rel="stylesheet" href="NeonSwarm/game.css?v=camera-gate-1">
</head>
<body>
  <main id="game">
    <canvas id="game-canvas"></canvas>
    <header data-game-topbar data-contained>
      <div class="game-topbar__identity">
        <h1>NEON <b>SWARM</b></h1>
        <p class="game-topbar__instructions" id="status">Choose a track. Tap left or right to switch lanes.</p>
      </div>
      <div class="game-topbar__right">
        <div class="game-topbar__controls">
          <span id="run-status"></span>
        </div>
        <div class="game-topbar__utilities" data-game-topbar-utilities></div>
      </div>
    </header>
    <section id="showstopper-bank" class="showstopper-bank" aria-label="Banked showstoppers">
      <button id="showstopper-trigger" class="showstopper-trigger" type="button" hidden>Dragon's Breath</button>
    </section>
    <section id="camera-lab" class="camera-lab" aria-label="Temporary camera controls" hidden>
      <label>Height <input id="camera-height" type="range" min="0" max="1000" step="5"></label>
      <label>Look <input id="camera-look" type="range" min="-10" max="85" step="1"></label>
      <label>Back <input id="camera-back" type="range" min="0" max="800" step="5"></label>
      <label>Zoom <input id="camera-zoom" type="range" min="0.05" max="3" step="0.01"></label>
      <label>Horizon <input id="camera-horizon" type="range" min="0.05" max="0.95" step="0.01"></label>
      <button id="camera-output" type="button">Output</button>
      <output id="camera-output-text" for="camera-height camera-look camera-back camera-zoom camera-horizon"></output>
    </section>
    <section id="track-select" class="track-select">
      <div class="track-menu-scroll">
        <canvas id="track-menu-canvas"></canvas>
        <div class="track-menu-copy" aria-hidden="true">
          <div class="track-menu-logo"><span>NEON</span><b>SWARM</b></div>
          <p>Choose your path</p>
        </div>
        <div id="track-menu-labels" class="track-menu-labels"></div>
        <div id="track-list" class="track-menu-hits" aria-label="Track families"></div>
      </div>
      <p id="developer-tools" class="developer-tools" hidden><a href="NeonSwarm/tests/index.html#dev-1">Open Test Center</a></p>
    </section>
    <section id="start-dialog" class="start-dialog" role="dialog" aria-modal="true" aria-labelledby="start-dialog-title" hidden>
      <div class="start-dialog__panel">
        <span id="start-dialog-family" class="start-dialog__family"></span>
        <h2 id="start-dialog-title"></h2>
        <p id="start-dialog-detail"></p>
        <div class="start-dialog__actions">
          <button id="cancel-track-start" type="button">Cancel</button>
          <button id="confirm-track-start" type="button">Start</button>
        </div>
      </div>
    </section>
    <section id="result" class="result" hidden><h2 id="result-title"></h2><p id="result-detail"></p><button id="back-to-tracks">Tracks</button></section>
    <section id="error" role="alert" hidden></section>
  </main>
  <script src="lib/top-bar/top-bar.js"></script>
  <script src="lib/audio/audio.js"></script>
  <script>
    gameAudio.preload([
      'Boss','Boss_Alt1','BossDestroyed','ButtonClick',
      'EnemyDestroyed','EnemyDestroyed_Alt1','EnemyDestroyed_Alt2',
      'DragonBreath','EnemyEscaped',
      'GlassShieldShatter',
      'EnemyHit','EnemyHit_Alt1','EnemyHit_Alt2',
      'EnemySpawn','EnemySpawn_Alt1','EnemySpawn_Alt2',
      'GameOver','HeavyImpact','HeavyImpact_Alt1','HeavyImpact_Alt2','Hit',
      'Lightning','Lightning_Alt1','Lightning_Alt2',
      'MenuOpen','NeedlerFire',
      'Pickup','PickupGun','PickupMultiplier','PickupShield','PickupSword',
      'PlayerDamage',
      'Primary','Primary_Alt1','Primary_Alt2','Primary_Alt3',
      'ProjectileHit','ProjectileHit_Alt1','ProjectileHit_Alt2',
      'ProjectileMiss','PuzzleComplete','Secondary','Secondary_Alt1','Secondary_Alt2',
      'Shield','ShieldAura','ShieldBreak','ShieldImpact','ShieldPulse','ShieldRecharge',
      'SquadMemberLost','Streak','SwordArcImpact','SwordCleaverImpact','SwordSwingWhoosh',
      'TrackStart','WavePressure'
    ]);
  </script>
  <script type="module" src="NeonSwarm/game.js?v=camera-gate-1"></script>
</body>
</html>
