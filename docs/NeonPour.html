<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Neon Pour</title>
<style>
:root {
  --bg0:#070a12;
  --bg1:#111827;
  --text:#eef4ff;
  --muted:#9fb0cc;
  --cyan:#56ccff;
  --pink:#ff5fb7;
  --green:#7cffb2;
  --gold:#ffd166;
  --glass:rgba(255,255,255,.08);
}

* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  margin:0;
  min-height:100vh;
  min-height:100dvh;
  overflow:hidden;
  font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,Arial;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 16%, rgba(86,204,255,.2), transparent 30%),
    radial-gradient(circle at 85% 18%, rgba(255,95,183,.17), transparent 28%),
    radial-gradient(circle at 50% 86%, rgba(124,255,178,.13), transparent 34%),
    linear-gradient(145deg,var(--bg0),var(--bg1));
}

body::after {
  content:"";
  position:fixed;
  inset:auto -18vw -36vh -18vw;
  height:62vh;
  pointer-events:none;
  background:
    linear-gradient(rgba(86,204,255,.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,95,183,.07) 1px, transparent 1px);
  background-size:54px 54px;
  transform:perspective(500px) rotateX(62deg);
  transform-origin:center bottom;
  opacity:.55;
}

header {
  position:fixed;
  top:16px;
  left:50%;
  width:min(720px, calc(100vw - 24px));
  transform:translateX(-50%);
  z-index:5;
  display:grid;
  grid-template-columns:1fr auto;
  gap:12px;
  align-items:start;
  pointer-events:none;
}

h1 {
  margin:0;
  font-size:clamp(27px,7vw,46px);
  letter-spacing:0;
  line-height:.95;
  text-shadow:0 0 24px rgba(86,204,255,.28);
}

.subtitle {
  margin-top:6px;
  color:var(--muted);
  font-size:14px;
  font-weight:650;
}

.controls {
  display:flex;
  flex-wrap:wrap;
  justify-content:flex-end;
  gap:8px;
  pointer-events:auto;
}

button,
select,
.pill {
  min-height:40px;
  border:1px solid rgba(255,255,255,.14);
  border-radius:999px;
  background:var(--glass);
  color:var(--text);
  box-shadow:0 10px 30px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.08);
  backdrop-filter:blur(14px);
  font:800 13px/1 Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,Arial;
}

button,
select {
  cursor:pointer;
  transition:transform .15s ease, background .15s ease, border-color .15s ease;
}

button { padding:10px 13px; }
select { padding:0 32px 0 13px; }
.pill { display:grid; place-items:center; padding:0 13px; color:var(--muted); }
button:active { transform:scale(.96); background:rgba(255,255,255,.16); }
button:disabled { opacity:.45; cursor:default; }

#game {
  position:fixed;
  inset:0;
  display:grid;
  place-items:center;
  padding:116px 12px 24px;
  touch-action:manipulation;
  user-select:none;
}

.board {
  width:min(720px, 100%);
  display:grid;
  grid-template-columns:repeat(var(--cols), minmax(54px, 1fr));
  gap:clamp(13px, 3.4vw, 26px) clamp(12px, 2.8vw, 22px);
  justify-items:center;
  align-items:end;
}

.tube {
  position:relative;
  width:clamp(54px, 12.6vw, 82px);
  height:clamp(188px, 44vh, 276px);
  border:0;
  border-radius:0 0 28px 28px;
  background:transparent;
  cursor:pointer;
  padding:0;
  outline:0;
  filter:drop-shadow(0 16px 28px rgba(0,0,0,.34));
}

.tube-shell {
  position:absolute;
  inset:0;
  border:2px solid rgba(220,248,255,.5);
  border-top:0;
  border-radius:0 0 28px 28px;
  background:
    linear-gradient(90deg, rgba(255,255,255,.18), rgba(255,255,255,.035) 22% 72%, rgba(255,255,255,.18)),
    linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015));
  box-shadow:
    inset 0 0 18px rgba(255,255,255,.08),
    0 0 22px rgba(86,204,255,.16);
  overflow:hidden;
}

.tube-shell::before {
  content:"";
  position:absolute;
  left:-9px;
  right:-9px;
  top:-8px;
  height:18px;
  border:2px solid rgba(220,248,255,.55);
  border-radius:50%;
  background:rgba(255,255,255,.07);
  box-shadow:0 0 18px rgba(86,204,255,.24);
  z-index:3;
}

.tube-shell::after {
  content:"";
  position:absolute;
  inset:10px auto 18px 13px;
  width:9px;
  border-radius:999px;
  background:linear-gradient(180deg, rgba(255,255,255,.5), transparent 68%);
  opacity:.36;
  z-index:4;
}

.liquid-stack {
  position:absolute;
  left:7px;
  right:7px;
  bottom:7px;
  height:calc(100% - 13px);
  display:flex;
  flex-direction:column-reverse;
  justify-content:flex-start;
  overflow:hidden;
  border-radius:0 0 22px 22px;
}

.segment {
  position:relative;
  height:25%;
  flex:0 0 25%;
  background:
    radial-gradient(circle at 30% 22%, rgba(255,255,255,.78), transparent 18%),
    linear-gradient(135deg, color-mix(in srgb, var(--c), white 24%), var(--c) 54%, color-mix(in srgb, var(--c), black 24%));
  box-shadow:inset 0 6px 11px rgba(255,255,255,.18), inset 0 -7px 14px rgba(0,0,0,.22), 0 0 18px color-mix(in srgb, var(--c), transparent 36%);
}

.segment::before {
  content:"";
  position:absolute;
  left:0;
  right:0;
  top:-7px;
  height:14px;
  border-radius:50%;
  background:linear-gradient(90deg, rgba(255,255,255,.25), rgba(255,255,255,.04), rgba(255,255,255,.2));
}

.tube.selected {
  animation:selectedPulse .82s ease-in-out infinite alternate;
}

.tube.selected .tube-shell {
  border-color:rgba(124,255,178,.85);
  box-shadow:inset 0 0 20px rgba(255,255,255,.12), 0 0 30px rgba(124,255,178,.44);
}

.tube.invalid { animation:shake .28s ease; }
.tube.pour-target .tube-shell { box-shadow:inset 0 0 18px rgba(255,255,255,.08), 0 0 34px rgba(255,209,102,.38); }

@keyframes selectedPulse {
  from { transform:translateY(-8px) scale(1.02); filter:drop-shadow(0 16px 28px rgba(0,0,0,.34)); }
  to { transform:translateY(-12px) scale(1.045); filter:drop-shadow(0 0 24px rgba(124,255,178,.46)); }
}

@keyframes shake {
  0%,100% { transform:translateX(0); }
  30% { transform:translateX(-6px); }
  65% { transform:translateX(6px); }
}

.pour-stream {
  position:fixed;
  z-index:7;
  width:12px;
  height:0;
  border-radius:999px;
  background:linear-gradient(180deg, rgba(255,255,255,.82), var(--c));
  box-shadow:0 0 18px var(--c), 0 0 30px color-mix(in srgb, var(--c), transparent 38%);
  pointer-events:none;
  transform-origin:top center;
  animation:stream .36s ease-in-out forwards;
}

@keyframes stream {
  0% { height:0; opacity:0; }
  18% { opacity:1; }
  50% { height:var(--h); }
  100% { height:0; opacity:0; transform:translate(var(--dx), var(--dy)); }
}

.particle {
  position:fixed;
  z-index:12;
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--c);
  box-shadow:0 0 16px var(--c);
  pointer-events:none;
  animation:spark .86s ease-out forwards;
}

@keyframes spark {
  to { opacity:0; transform:translate(var(--dx), var(--dy)) scale(0); }
}

.overlay {
  position:fixed;
  inset:0;
  display:grid;
  place-items:center;
  padding:18px;
  z-index:20;
  background:rgba(2,5,12,.38);
  backdrop-filter:blur(9px);
  opacity:0;
  pointer-events:none;
  transition:opacity .35s ease;
}

.overlay.show {
  opacity:1;
  pointer-events:auto;
}

.dialog {
  width:min(430px, 100%);
  padding:30px;
  border:1px solid rgba(255,255,255,.18);
  border-radius:30px;
  text-align:center;
  background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.07));
  box-shadow:0 30px 90px rgba(0,0,0,.52);
  transform:translateY(18px) scale(.96);
  transition:transform .35s cubic-bezier(.2,1.3,.2,1);
}

.overlay.show .dialog { transform:translateY(0) scale(1); }
.dialog h2 { margin:0 0 8px; font-size:34px; letter-spacing:0; }
.dialog p { margin:0 0 22px; color:var(--muted); line-height:1.45; }

@media (max-width:560px) {
  header {
    grid-template-columns:1fr;
    top:13px;
  }
  .controls {
    justify-content:flex-start;
  }
  .subtitle {
    max-width:280px;
  }
  #game {
    padding-top:154px;
  }
  .pill {
    display:none;
  }
  .board {
    grid-template-columns:repeat(var(--mobile-cols), minmax(48px, 1fr));
    gap:12px 9px;
  }
  .tube {
    width:clamp(48px, 17vw, 64px);
    height:clamp(154px, 31vh, 204px);
  }
}
</style>
</head>
<body>
<header>
  <div>
    <h1>Neon Pour</h1>
    <div class="subtitle">Tap a tube, then pour into an empty tube or onto the same top color.</div>
  </div>
  <div class="controls" aria-label="Game controls">
    <div class="pill" id="moveLabel">Moves: 0</div>
    <select id="difficulty" aria-label="Difficulty">
      <option value="easy">Easy</option>
      <option value="normal" selected>Normal</option>
      <option value="hard">Hard</option>
    </select>
    <button id="undo">Undo</button>
    <button id="newGame">New</button>
  </div>
</header>

<main id="game">
  <section class="board" id="board" aria-label="Liquid sort puzzle board"></section>
</main>

<div class="overlay" id="overlay">
  <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
    <h2 id="dialogTitle">Sorted</h2>
    <p id="dialogText">Every tube is cleanly stacked.</p>
    <button id="again">Play again</button>
  </div>
</div>

<script>
const CAPACITY = 4;
const COLORS = ["#56ccff", "#ff5fb7", "#7cffb2", "#ffd166", "#9b7cff", "#ff7a59", "#4df4d8", "#f25fff", "#b6ff4d"];
const SETTINGS = {
  easy: { colors: 4, empties: 2, shuffles: 46 },
  normal: { colors: 6, empties: 2, shuffles: 86 },
  hard: { colors: 8, empties: 3, shuffles: 138 }
};

const boardEl = document.getElementById("board");
const difficultyEl = document.getElementById("difficulty");
const undoBtn = document.getElementById("undo");
const newBtn = document.getElementById("newGame");
const moveLabel = document.getElementById("moveLabel");
const overlay = document.getElementById("overlay");
const againBtn = document.getElementById("again");

let tubes = [];
let selected = null;
let history = [];
let moves = 0;
let locked = false;

function cloneBoard(board) {
  return board.map(tube => tube.slice());
}

function topGroup(tube) {
  if (!tube.length) return null;
  const color = tube[tube.length - 1];
  let count = 1;
  for (let i = tube.length - 2; i >= 0 && tube[i] === color; i--) count++;
  return { color, count };
}

function legalPourAmount(board, from, to) {
  if (from === to) return 0;
  const source = board[from];
  const dest = board[to];
  if (!source.length || dest.length >= CAPACITY) return 0;
  const group = topGroup(source);
  const destTop = dest[dest.length - 1];
  if (destTop && destTop !== group.color) return 0;
  return Math.min(group.count, CAPACITY - dest.length);
}

function doPour(board, from, to, amount) {
  const moved = board[from].splice(board[from].length - amount, amount);
  board[to].push(...moved);
}

function allLegalMoves(board) {
  const moves = [];
  for (let from = 0; from < board.length; from++) {
    for (let to = 0; to < board.length; to++) {
      const amount = legalPourAmount(board, from, to);
      if (amount) moves.push({ from, to, amount });
    }
  }
  return moves;
}

function allReverseShuffleMoves(board) {
  const moves = [];
  for (let from = 0; from < board.length; from++) {
    const source = board[from];
    if (!source.length) continue;
    const group = topGroup(source);
    for (let amount = 1; amount <= group.count; amount++) {
      const exposed = source[source.length - amount - 1];
      if (exposed !== undefined && exposed !== group.color) continue;
      for (let to = 0; to < board.length; to++) {
        if (from === to || board[to].length + amount > CAPACITY) continue;
        moves.push({ from, to, amount });
      }
    }
  }
  return moves;
}

function isSolved(board = tubes) {
  return board.every(tube => !tube.length || (tube.length === CAPACITY && tube.every(color => color === tube[0])));
}

function makeSolved(colorCount, empties) {
  const board = [];
  for (let i = 0; i < colorCount; i++) board.push(Array(CAPACITY).fill(i));
  for (let i = 0; i < empties; i++) board.push([]);
  return board;
}

function shuffleBoard() {
  const setting = SETTINGS[difficultyEl.value];
  let candidate = makeSolved(setting.colors, setting.empties);
  let last = null;

  for (let i = 0; i < setting.shuffles; i++) {
    let moves = allReverseShuffleMoves(candidate).filter(move => !last || move.from !== last.to || move.to !== last.from);
    if (!moves.length) moves = allReverseShuffleMoves(candidate);
    if (!moves.length) break;
    const move = moves[Math.floor(Math.random() * moves.length)];
    doPour(candidate, move.from, move.to, move.amount);
    last = move;
  }

  return candidate;
}

function generatePuzzle() {
  for (let tries = 0; tries < 80; tries++) {
    const puzzle = shuffleBoard();
    if (!isSolved(puzzle) && puzzle.some(tube => tube.length && tube.length < CAPACITY)) return puzzle;
  }
  const fallback = makeSolved(SETTINGS[difficultyEl.value].colors, SETTINGS[difficultyEl.value].empties);
  doPour(fallback, 0, fallback.length - 1, 1);
  doPour(fallback, 1, 0, 1);
  return fallback;
}

function startGame() {
  tubes = generatePuzzle();
  selected = null;
  history = [];
  moves = 0;
  locked = false;
  overlay.classList.remove("show");
  render();
}

function render() {
  const count = tubes.length;
  boardEl.style.setProperty("--cols", count <= 6 ? count : Math.ceil(count / 2));
  boardEl.style.setProperty("--mobile-cols", count <= 6 ? 3 : 4);
  moveLabel.textContent = `Moves: ${moves}`;
  undoBtn.disabled = !history.length || locked;

  boardEl.innerHTML = "";
  tubes.forEach((tube, index) => {
    const button = document.createElement("button");
    button.className = "tube";
    button.type = "button";
    button.dataset.index = index;
    button.setAttribute("aria-label", `Tube ${index + 1}, ${tube.length} of ${CAPACITY} filled`);
    if (selected === index) button.classList.add("selected");

    const shell = document.createElement("div");
    shell.className = "tube-shell";
    const stack = document.createElement("div");
    stack.className = "liquid-stack";

    tube.forEach(colorIndex => {
      const segment = document.createElement("span");
      segment.className = "segment";
      segment.style.setProperty("--c", COLORS[colorIndex]);
      stack.appendChild(segment);
    });

    shell.appendChild(stack);
    button.appendChild(shell);
    button.addEventListener("click", () => chooseTube(index));
    boardEl.appendChild(button);
  });
}

function chooseTube(index) {
  if (locked) return;
  if (selected === null) {
    if (!tubes[index].length) return markInvalid(index);
    selected = index;
    render();
    return;
  }

  if (selected === index) {
    selected = null;
    render();
    return;
  }

  const amount = legalPourAmount(tubes, selected, index);
  if (!amount) {
    markInvalid(index);
    selected = tubes[index].length ? index : null;
    render();
    return;
  }

  pour(selected, index, amount);
}

function pour(from, to, amount) {
  locked = true;
  const before = cloneBoard(tubes);
  const color = topGroup(tubes[from]).color;
  const fromEl = boardEl.querySelector(`[data-index="${from}"]`);
  const toEl = boardEl.querySelector(`[data-index="${to}"]`);
  animatePour(fromEl, toEl, COLORS[color]);

  window.setTimeout(() => {
    history.push(before);
    doPour(tubes, from, to, amount);
    selected = null;
    moves++;
    locked = false;
    render();
    if (isSolved()) celebrate();
  }, 230);
}

function animatePour(fromEl, toEl, color) {
  if (!fromEl || !toEl) return;
  toEl.classList.add("pour-target");
  window.setTimeout(() => toEl.classList.remove("pour-target"), 420);

  const a = fromEl.getBoundingClientRect();
  const b = toEl.getBoundingClientRect();
  const x1 = a.left + a.width / 2;
  const y1 = a.top + 18;
  const x2 = b.left + b.width / 2;
  const y2 = b.top + 22;
  const stream = document.createElement("span");
  stream.className = "pour-stream";
  stream.style.left = `${x1 - 6}px`;
  stream.style.top = `${Math.min(y1, y2)}px`;
  stream.style.setProperty("--c", color);
  stream.style.setProperty("--h", `${Math.max(46, Math.abs(y2 - y1) + 38)}px`);
  stream.style.setProperty("--dx", `${x2 - x1}px`);
  stream.style.setProperty("--dy", `${Math.max(0, y2 - y1)}px`);
  document.body.appendChild(stream);
  stream.addEventListener("animationend", () => stream.remove(), { once:true });
}

function markInvalid(index) {
  const tube = boardEl.querySelector(`[data-index="${index}"]`);
  if (!tube) return;
  tube.classList.remove("invalid");
  void tube.offsetWidth;
  tube.classList.add("invalid");
  tube.addEventListener("animationend", () => tube.classList.remove("invalid"), { once:true });
}

function undo() {
  if (!history.length || locked) return;
  tubes = history.pop();
  selected = null;
  moves = Math.max(0, moves - 1);
  render();
}

function celebrate() {
  locked = true;
  selected = null;
  render();
  const rect = boardEl.getBoundingClientRect();
  for (let i = 0; i < 54; i++) {
    const particle = document.createElement("span");
    particle.className = "particle";
    particle.style.left = `${rect.left + rect.width * (.18 + Math.random() * .64)}px`;
    particle.style.top = `${rect.top + rect.height * (.18 + Math.random() * .48)}px`;
    particle.style.setProperty("--c", COLORS[Math.floor(Math.random() * COLORS.length)]);
    particle.style.setProperty("--dx", `${(Math.random() - .5) * 260}px`);
    particle.style.setProperty("--dy", `${(Math.random() - .7) * 220}px`);
    document.body.appendChild(particle);
    particle.addEventListener("animationend", () => particle.remove(), { once:true });
    window.setTimeout(() => particle.remove(), 1400);
  }
  window.setTimeout(() => overlay.classList.add("show"), 520);
}

difficultyEl.addEventListener("change", startGame);
newBtn.addEventListener("click", startGame);
againBtn.addEventListener("click", startGame);
undoBtn.addEventListener("click", undo);

startGame();
</script>
</body>
</html>
