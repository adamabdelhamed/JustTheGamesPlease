<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Carpet Calm</title>
  <script src="lib/analytics.js"></script>
  <link rel="stylesheet" href="lib/top-bar/top-bar.css">
  <link rel="stylesheet" href="CarpetCalm/game.css">
  <style>.dry-meter b{background:linear-gradient(90deg,#54a7ff,#b9e9ff);box-shadow:0 0 10px #67c9ff}.dry-meter strong{color:#9edcff}.vacuum-icon{color:#b99cff}@media(min-width:651px){.toolbox .tool{width:132px}}@media(max-width:650px){.toolbox{gap:3px;padding:5px}.toolbox .tool{width:68px;padding:6px}.clean-meter i{width:48px}}</style>
  <style>.overlay.celebration{align-items:end;padding-bottom:18px;background:linear-gradient(180deg,rgba(3,12,9,.08),rgba(3,12,9,.18));backdrop-filter:none;pointer-events:none}.overlay.celebration .dialog{width:min(520px,calc(100% - 24px));padding:18px 28px;border-color:#7fffc255;background:#0d1814d9;box-shadow:0 12px 50px #0008;pointer-events:auto}.overlay.celebration .dialog h2{margin:6px 0;font-size:clamp(26px,4vw,42px)}.overlay.celebration .dialog p{margin:6px 0}.overlay.celebration .dialog button{margin:7px 0 4px}.overlay.celebration .dialog small{display:none}</style>
</head>
<body>
  <main id="game" aria-label="Carpet Calm game area">
    <canvas id="scene"></canvas>
    <header data-game-topbar data-contained>
      <div class="game-topbar__identity"><h1>CARPET <b>CALM</b></h1><p class="game-topbar__instructions" id="status">Choose a tool, then drag across the carpet</p></div>
      <div class="game-topbar__right">
        <div class="clean-meter game-topbar__controls"><span>Clean</span><i><b id="cleanFill"></b></i><strong id="cleanText">0%</strong></div>
        <div class="clean-meter dry-meter game-topbar__controls"><span>Dry</span><i><b id="dryFill"></b></i><strong id="dryText">100%</strong></div>
        <select id="difficulty" data-topbar-select aria-label="Difficulty"><option value="easy">Easy</option><option value="medium">Medium</option><option value="hard">Hard</option></select>
        <div class="game-topbar__utilities" data-game-topbar-utilities></div>
      </div>
    </header>
    <section class="toolbox" aria-label="Cleaning tools">
      <button class="tool selected" data-tool="soap"><span class="tool-icon soap-icon">+</span><strong>Soap</strong><small>Loosens dirt</small><kbd>1</kbd></button>
      <button class="tool" data-tool="water"><span class="tool-icon water-icon">◆</span><strong>Water</strong><small>Rinses right</small><kbd>2</kbd></button>
      <button class="tool" data-tool="rotary"><span class="tool-icon rotary-icon">✦</span><strong>Rotary</strong><small>Agitates mud</small><kbd>3</kbd></button>
      <button class="tool" data-tool="squeegee"><span class="tool-icon squeegee-icon">T</span><strong>Squeegee</strong><small>Pushes runoff</small><kbd>4</kbd></button>
      <button class="tool" data-tool="vacuum"><span class="tool-icon vacuum-icon">V</span><strong>Vacuum</strong><small>Extracts water</small><kbd>5</kbd></button>
    </section>
    <div class="hint" id="hint">Soap the dirty fibers first</div>
    <section class="overlay show" id="overlay">
      <div class="dialog"><span class="eyebrow">SATISFYING CLEAN</span><h2 id="overlayTitle">Reveal the carpet<br><b>underneath.</b></h2><p id="overlayMessage">Soap, scrub, and rinse. Push thick mud with the squeegee, then vacuum clean water until the mat is dry.</p><button id="start">START CLEANING</button><small>Drag · Touch · Keys 1–5</small></div>
    </section>
  </main>
  <script src="lib/top-bar/top-bar.js"></script>
  <script src="lib/audio/audio.js?v=20260618-2"></script>
  <script>gameAudio.preload(['Soap','Water','Rotary','SqueegeeFloor','SqueegeeCarpet','Vacuum','Complete']);gameAudio.playSharedMusic(['Music']);</script>
  <script type="module" src="CarpetCalm/game.js"></script>
</body>
</html>
