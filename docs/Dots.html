<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Neon Links</title>
<link rel="icon" type="image/png" sizes="32x32" href="icons/links-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/links-180.png">
<link rel="manifest" href="manifests/links.webmanifest">
<meta name="theme-color" content="#05071c"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Neon Links">
<script src="lib/analytics.js"></script>
<script src="lib/recording/recording.js"></script>
<style>
:root {
  --bg0:#070a12;
  --bg1:#111827;
  --text:#eef4ff;
  --muted:#9fb0cc;
}

* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  margin:0;
  min-height:100vh;
  overflow:hidden;
  font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,Arial;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 16%, rgba(86,204,255,.2), transparent 30%),
    radial-gradient(circle at 85% 18%, rgba(255,95,183,.17), transparent 28%),
    radial-gradient(circle at 50% 86%, rgba(124,255,178,.13), transparent 34%),
    linear-gradient(145deg,var(--bg0),var(--bg1));
}

header {
  position:fixed;
  inset:18px 16px auto 16px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  z-index:5;
  pointer-events:none;
}

h1 {
  margin:0;
  font-size:clamp(25px,7vw,42px);
  letter-spacing:-.05em;
  line-height:.95;
}

.subtitle {
  color:var(--muted);
  font-weight:650;
  margin-top:6px;
  font-size:14px;
}

.stats {
  display:flex;
  gap:8px;
  align-items:center;
  flex-shrink:0;
}

.pill, button {
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.08);
  color:var(--text);
  backdrop-filter:blur(14px);
  box-shadow:0 10px 30px rgba(0,0,0,.24);
  border-radius:999px;
  padding:10px 12px;
  font-weight:800;
  font-size:13px;
}

button {
  pointer-events:auto;
  cursor:pointer;
  transition:transform .15s ease, background .15s ease;
}

button:active { transform:scale(.96); background:rgba(255,255,255,.16); }

#game {
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  touch-action:none;
  user-select:none;
}

.dot {
  position:absolute;
  width:42px;
  height:42px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  border:3px solid rgba(255,255,255,.92);
  box-shadow:
    0 0 0 9px rgba(255,255,255,.055),
    0 0 26px currentColor,
    0 12px 34px rgba(0,0,0,.4);
  cursor:pointer;
  z-index:4;
  transition:transform .16s ease, filter .16s ease, opacity .16s ease;
}

.dot.active { transform:translate(-50%,-50%) scale(1.2); filter:brightness(1.25); }
.dot.connected { animation:pulse .7s ease; }

@keyframes pulse {
  0% { transform:translate(-50%,-50%) scale(1); }
  50% { transform:translate(-50%,-50%) scale(1.42); }
  100% { transform:translate(-50%,-50%) scale(1); }
}

.spark {
  position:absolute;
  width:7px;
  height:7px;
  border-radius:50%;
  pointer-events:none;
  z-index:3;
  background:white;
  box-shadow:0 0 16px white;
  animation:spark .72s ease-out forwards;
}

@keyframes spark {
  to {
    opacity:0;
    transform:translate(var(--dx),var(--dy)) scale(0);
  }
}

#svg {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:2;
  pointer-events:none;
}

path {
  fill:none;
  stroke-linecap:round;
  stroke-linejoin:round;
  filter:drop-shadow(0 0 8px currentColor);
}

.draw-path {
  stroke-width:8;
  opacity:.96;
  transition:stroke-width .22s ease;
}

.ghost-path {
  stroke-width:5;
  opacity:.72;
}

.path-texture {
  stroke:white;
  stroke-width:2;
  stroke-dasharray:1 13;
  stroke-linecap:round;
  opacity:.72;
  filter:drop-shadow(0 0 5px currentColor);
  animation:textureFlow .7s linear infinite;
}

@keyframes textureFlow { to { stroke-dashoffset:-28; } }

.path-dematerialize { animation:dematerialize 1.05s linear forwards; }
@keyframes dematerialize { to { opacity:0; stroke-dasharray:2 22; stroke-dashoffset:-102; filter:blur(4px) drop-shadow(0 0 12px currentColor); } }

.dot-explode { animation:dotExplode .8s linear forwards !important; }
@keyframes dotExplode { 50% { transform:translate(-50%,-50%) scale(1.2); opacity:.5; } 100% { transform:translate(-50%,-50%) scale(.1); opacity:0; } }

.confetti {
  position:absolute;
  width:7px;
  height:15px;
  border-radius:2px;
  pointer-events:none;
  z-index:6;
  animation:confettiFall 1.65s linear forwards;
}
@keyframes confettiFall {
  50% { transform:translate(var(--mid-x),var(--mid-y)) rotate(var(--mid-spin)); opacity:.5; }
  100% { transform:translate(var(--dx),var(--dy)) rotate(var(--spin)); opacity:0; }
}

.bad-path {
  stroke:#ff5577 !important;
  color:#ff5577 !important;
  animation:badPulse .3s ease infinite alternate;
}

@keyframes badPulse {
  from { opacity:.55; }
  to { opacity:1; }
}

.overlay {
  position:fixed;
  inset:0;
  display:grid;
  place-items:center;
  background:rgba(2,5,12,.38);
  backdrop-filter:blur(9px);
  opacity:0;
  pointer-events:none;
  z-index:10;
  transition:opacity .35s ease;
}

.overlay.show {
  opacity:1;
  pointer-events:auto;
}

.dialog {
  width:min(430px,calc(100vw - 34px));
  padding:30px;
  border-radius:30px;
  text-align:center;
  border:1px solid rgba(255,255,255,.18);
  background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.07));
  box-shadow:0 30px 90px rgba(0,0,0,.52);
  transform:translateY(18px) scale(.96);
  transition:transform .35s cubic-bezier(.2,1.3,.2,1);
}

.overlay.show .dialog { transform:translateY(0) scale(1); }

.dialog h2 {
  margin:0 0 8px;
  font-size:34px;
  letter-spacing:-.04em;
}

.dialog p {
  margin:0 0 22px;
  color:var(--muted);
  line-height:1.45;
}

.board-flash { animation:endFlash .75s ease; }

@keyframes endFlash {
  0% { filter:brightness(1); }
  45% { filter:brightness(1.75) saturate(1.5); }
  100% { filter:brightness(1); }
}

@media (max-width:520px) {
  header { inset:14px 12px auto 12px; }
  .subtitle { max-width:210px; }
  .pill { display:none; }
}
</style>
<link rel="stylesheet" href="lib/top-bar/top-bar.css">
</head>
<body>
<header data-game-topbar data-mobile-compact>
  <div class="game-topbar__identity">
    <h1>Neon Links</h1>
    <p class="game-topbar__instructions">Draw paths between matching dots. No crossings.</p>
  </div>
  <div class="game-topbar__right">
    <select id="difficulty" aria-label="Difficulty" data-topbar-select>
      <option value="easy" selected>Easy</option>
      <option value="normal">Normal</option>
      <option value="hard">Hard</option>
    </select>
    <div class="stats game-topbar__controls"><div class="pill" id="levelLabel">Pairs: 3</div><button id="newGame">New</button></div>
    <div class="game-topbar__utilities" data-game-topbar-utilities></div>
  </div>
</header>

<div id="game">
  <svg id="svg"></svg>
</div>

<div class="overlay" id="overlay">
  <div class="dialog">
    <h2 id="dialogTitle"></h2>
    <p id="dialogText"></p>
    <button id="again">Play again</button>
  </div>
</div>

<script src="lib/top-bar/top-bar.js"></script>
<script src="lib/audio/audio.js"></script>
<script>
gameAudio.playSharedMusic(['Music']);
gameAudio.preload(['DotGrab','DrawLoop','LinkCancel','LinkComplete','WrongLink','PuzzleComplete']);
const game = document.getElementById("game");
const svg = document.getElementById("svg");
const overlay = document.getElementById("overlay");
const dialogTitle = document.getElementById("dialogTitle");
const dialogText = document.getElementById("dialogText");
const levelLabel = document.getElementById("levelLabel");
const difficultyEl = document.getElementById("difficulty");
const query = new URLSearchParams(location.search);
const devMode = query.get("dev") === "1";
const rendererMode = query.get("renderer") === "1";
let recording = null;

const colors = ["#56ccff","#ff5fb7","#7cffb2","#ffd166","#a78bfa","#ff8a5b"];
const difficultySettings = {
  easy: { minPairs:3, maxPairs:4 },
  normal: { minPairs:5, maxPairs:5 },
  hard: { minPairs:6, maxPairs:6 }
};
let dots = [];
let paths = [];
let active = null;
let activePoints = [];
let ghost = null;
let drawLoop = null;
let locked = false;
let crossedWhileDrawing = false;
let completedLinks = 0;
let pairCount = 0;

gameAnalytics.pageLoaded("Neon Links");

function rand(min,max) { return Math.random() * (max - min) + min; }
function distance(a,b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function clearGame() {
  stopDrawLoop();
  dots.forEach(d => d.el.remove());
  dots = [];
  paths = [];
  active = null;
  activePoints = [];
  locked = false;
  crossedWhileDrawing = false;
  svg.innerHTML = "";
  overlay.classList.remove("show");
  document.querySelectorAll(".spark").forEach(s => s.remove());
}

function newGame() {
  clearGame();
  const difficulty = difficultyEl.value;
  const settings = difficultySettings[difficulty];
  pairCount = Math.floor(rand(settings.minPairs, settings.maxPairs + 1));
  completedLinks = 0;
  gameAnalytics.played("Neon Links", { difficulty, pair_count: pairCount });
  levelLabel.textContent = `Pairs: ${pairCount}`;
  const marginX = Math.max(42, Math.min(90, innerWidth * .12));
  const top = Math.max(122, innerHeight * .18);
  const marginBottom = 56;
  const points = [];
  const minimumSpacing = Math.max(58, Math.min(86, Math.sqrt((innerWidth - marginX * 2) * (innerHeight - top - marginBottom) / (pairCount * 2)) * .52));
  let attempts = 0;

  while (points.length < pairCount * 2 && attempts++ < 2000) {
    const p = { x:rand(marginX, innerWidth - marginX), y:rand(top, innerHeight - marginBottom) };
    if (points.every(q => distance(p,q) > minimumSpacing)) points.push(p);
  }

  if (points.length < pairCount * 2) {
    points.length = 0;
    const columns = Math.ceil(Math.sqrt(pairCount * 2));
    const rows = Math.ceil(pairCount * 2 / columns);
    for (let i = 0; i < pairCount * 2; i++) {
      const column = i % columns;
      const row = Math.floor(i / columns);
      points.push({
        x:marginX + (innerWidth - marginX * 2) * (column + .5) / columns,
        y:top + (innerHeight - top - marginBottom) * (row + .5) / rows
      });
    }
  }

  for (let pair = 0; pair < pairCount; pair++) {
    for (let i = 0; i < 2; i++) {
      const p = points[pair * 2 + i];
      const el = document.createElement("div");
      el.className = "dot";
      el.style.left = `${p.x}px`;
      el.style.top = `${p.y}px`;
      el.style.color = colors[pair];
      el.style.background = `radial-gradient(circle at 35% 30%, white, ${colors[pair]} 30%, #111 120%)`;
      game.appendChild(el);
      dots.push({ id:dots.length, pair, x:p.x, y:p.y, color:colors[pair], el, connected:false });
    }
  }
  recording = gameRecording.devMode && !gameRecording.rendererMode ? {
    schemaVersion:1,
    game:"Neon Links",
    recordedAt:new Date().toISOString(),
    difficulty,
    viewport:{ width:innerWidth, height:innerHeight },
    dots:dots.map(({ id,pair,x,y,color }) => ({ id,pair,x,y,color })),
    links:[],
    audio:[],
    startedAt:performance.now()
  } : null;
}

function recordingTime() { return recording ? performance.now() - recording.startedAt : 0; }
function recordAudio(name) {
  if (recording) recording.audio.push({ name, timeMs:recordingTime() });
}

function makePath(points,color,cls) {
  const path = document.createElementNS("http://www.w3.org/2000/svg","path");
  path.style.stroke = color;
  path.style.color = color;
  path.setAttribute("class", cls);
  path.setAttribute("d", pathData(points));
  svg.appendChild(path);
  return path;
}

function pathData(points) {
  if (points.length === 0) return "";
  if (points.length === 1) return `M ${points[0].x} ${points[0].y}`;
  let d = `M ${points[0].x} ${points[0].y}`;
  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1];
    const p = points[i];
    const mx = (prev.x + p.x) / 2;
    const my = (prev.y + p.y) / 2;
    d += ` Q ${prev.x} ${prev.y} ${mx} ${my}`;
  }
  const last = points[points.length - 1];
  d += ` T ${last.x} ${last.y}`;
  return d;
}

const DOT_HIT_RADIUS = 34;
const DOT_START_SLOP = 14;
const DOT_LANDING_SLOP = 20;

function getDotAt(x,y,radius = DOT_HIT_RADIUS) {
  for (let i = dots.length - 1; i >= 0; i--) {
    const d = dots[i];
    if (distance(d, { x, y }) <= radius) return d;
  }
  return null;
}

function getForgivingLanding(x,y) {
  if (!active) return null;

  const point = { x, y };
  const target = dots.find(d =>
    d.id !== active.id &&
    d.pair === active.pair &&
    !d.connected &&
    distance(d, point) <= DOT_HIT_RADIUS + DOT_LANDING_SLOP);

  if (!target) return getDotAt(x,y);

  const last = activePoints[activePoints.length - 1];
  const landingSegment = { a:last, b:target };
  const blocked = paths.some(path => path.segments.some(segment =>
    segmentsIntersect(landingSegment.a, landingSegment.b, segment.a, segment.b)));

  return blocked ? getDotAt(x,y) : target;
}

function startDraw(dot, pointerId) {
  if (locked || dot.connected) return;
  gameAudio.play('DotGrab');
  stopDrawLoop();
  drawLoop = gameAudio.loopGapless('DrawLoop');
  recordAudio('DotGrab');
  active = dot;
  activePoints = [{ x:dot.x, y:dot.y, dotId:dot.id }];
  if (recording) recording.activeLink = { sourceId:dot.id, startedAtMs:recordingTime(), points:[{ x:dot.x, y:dot.y, timeMs:recordingTime() }] };
  crossedWhileDrawing = false;
  dot.el.classList.add("active");
  ghost = makePath(activePoints, dot.color, "ghost-path");
  try { game.setPointerCapture(pointerId); } catch {}
  sparkle(dot.x, dot.y, dot.color, 12);
}

function pointerDown(e) {
  const dot = getDotAt(e.clientX, e.clientY, DOT_HIT_RADIUS + DOT_START_SLOP);
  if (dot) startDraw(dot, e.pointerId);
}

function pointerMove(e) {
  if (!active || !ghost || locked) return;
  const point = { x:e.clientX, y:e.clientY };
  const last = activePoints[activePoints.length - 1];

  if (distance(point, last) < 8) return;

  const nextSegment = { a:last, b:point };
  const crossesExisting = paths.some(path => path.segments.some(seg => segmentsIntersect(nextSegment.a, nextSegment.b, seg.a, seg.b)));

  if (crossesExisting) crossedWhileDrawing = true;

  activePoints.push(point);
  if (recording?.activeLink) recording.activeLink.points.push({ x:point.x, y:point.y, timeMs:recordingTime() });
  ghost.setAttribute("d", pathData(activePoints));
  ghost.classList.toggle("bad-path", crossedWhileDrawing);

  if (Math.random() < .6) sparkle(e.clientX, e.clientY, active.color, 1);
}

function pointerUp(e) {
  const target = getForgivingLanding(e.clientX, e.clientY);
  finishDraw(target);
}

function finishDraw(target) {
  if (!active || locked) return;
  stopDrawLoop();

  const source = active;
  source.el.classList.remove("active");

  if (!target) {
    gameAudio.play('LinkCancel');
    recordAudio('LinkCancel');
    if (recording) recording.activeLink = null;
    cleanupActivePath();
    return;
  }

  activePoints.push({ x:target.x, y:target.y, dotId:target.id });
  if (recording?.activeLink) recording.activeLink.points.push({ x:target.x, y:target.y, dotId:target.id, timeMs:recordingTime() });

  if (source.id === target.id || source.pair !== target.pair || target.connected) {
    cleanupActivePath();
    fail("Wrong link", "Only matching colors can be connected.");
    return;
  }

  const segments = makeSegments(activePoints);
  const crossesExisting = paths.some(path => path.segments.some(existing => segments.some(next => segmentsIntersect(next.a, next.b, existing.a, existing.b))));

  if (crossedWhileDrawing || crossesExisting) {
    cleanupActivePath();
    fail("Lines crossed", "That path overlaps another connection.");
    return;
  }

  if (ghost) ghost.remove();
  const finalPath = makePath(activePoints, source.color, "draw-path");
  makePath(activePoints, source.color, "path-texture");
  paths.push({ source, target, points:activePoints.slice(), segments, el:finalPath });
  completedLinks++;

  source.connected = true;
  target.connected = true;
  source.el.classList.add("connected");
  target.el.classList.add("connected");
  gameAudio.play('LinkComplete');
  recordAudio('LinkComplete');
  if (recording?.activeLink) {
    recording.activeLink.targetId = target.id;
    recording.activeLink.completedAtMs = recordingTime();
    recording.links.push(recording.activeLink);
    recording.activeLink = null;
  }
  animatePath(finalPath);
  sparkle(target.x, target.y, target.color, 22);

  active = null;
  activePoints = [];
  ghost = null;

  if (dots.every(d => d.connected)) success();
}

function cleanupActivePath() {
  stopDrawLoop();
  if (ghost) ghost.remove();
  ghost = null;
  active = null;
  activePoints = [];
  crossedWhileDrawing = false;
  if (recording) recording.activeLink = null;
}

function makeSegments(points) {
  const segments = [];
  for (let i = 1; i < points.length; i++) {
    segments.push({ a:points[i - 1], b:points[i] });
  }
  return segments;
}

function animatePath(path) {
  const len = path.getTotalLength();
  path.style.strokeDasharray = len;
  path.style.strokeDashoffset = len;
  path.animate([{ strokeDashoffset:len }, { strokeDashoffset:0 }], { duration:420, easing:"cubic-bezier(.2,.9,.2,1)", fill:"forwards" });
}

function sparkle(x,y,color,count) {
  for (let i = 0; i < count; i++) {
    const s = document.createElement("div");
    s.className = "spark";
    s.style.left = `${x}px`;
    s.style.top = `${y}px`;
    s.style.background = color;
    s.style.boxShadow = `0 0 18px ${color}`;
    s.style.setProperty("--dx", `${rand(-35,35)}px`);
    s.style.setProperty("--dy", `${rand(-35,35)}px`);
    game.appendChild(s);
    setTimeout(() => s.remove(), 760);
  }
}

function segmentsIntersect(a,b,c,d) {
  const sharedEndpoint = (samePoint(a,c) || samePoint(a,d) || samePoint(b,c) || samePoint(b,d));
  if (sharedEndpoint) return false;

  const o1 = orientation(a,b,c);
  const o2 = orientation(a,b,d);
  const o3 = orientation(c,d,a);
  const o4 = orientation(c,d,b);

  if (o1 !== o2 && o3 !== o4) return true;
  if (o1 === 0 && onSegment(a,c,b)) return true;
  if (o2 === 0 && onSegment(a,d,b)) return true;
  if (o3 === 0 && onSegment(c,a,d)) return true;
  if (o4 === 0 && onSegment(c,b,d)) return true;
  return false;
}

function orientation(a,b,c) {
  const value = (b.y - a.y) * (c.x - b.x) - (b.x - a.x) * (c.y - b.y);
  if (Math.abs(value) < .001) return 0;
  return value > 0 ? 1 : 2;
}

function onSegment(a,b,c) {
  return b.x <= Math.max(a.x,c.x) + .001 && b.x >= Math.min(a.x,c.x) - .001 && b.y <= Math.max(a.y,c.y) + .001 && b.y >= Math.min(a.y,c.y) - .001;
}

function samePoint(a,b) {
  return Math.abs(a.x - b.x) < .001 && Math.abs(a.y - b.y) < .001;
}

function success() {
  locked = true;
  gameAnalytics.completed("Neon Links", { difficulty: difficultyEl.value, pair_count: pairCount, links_completed: completedLinks });
  gameAudio.play('PuzzleComplete');
  recordAudio('PuzzleComplete');
  saveSuccessfulRecording();
  endBurst("#54f7b5");
  setTimeout(() => showDialog("Perfect path", "Every pair is connected without a single crossing."), 1800);
}

function stopDrawLoop() {
  if (!drawLoop) return;
  drawLoop.stop();
  drawLoop = null;
}

function saveSuccessfulRecording() {
  if (!recording) return;
  delete recording.startedAt;
  delete recording.activeLink;
  recording.durationMs = Math.max(1, ...recording.links.map(link => link.completedAtMs), ...recording.audio.map(event => event.timeMs));
  gameRecording.saveSolution("Neon Links", recording);
  recording = null;
}

function validateReplay(replay) {
  const errors = [];
  if (!replay || !Array.isArray(replay.dots) || !Array.isArray(replay.links)) return { isValid:false, errors:["Replay structure is invalid."] };
  const replayDots = replay.dots.map(dot => ({ ...dot, connected:false }));
  const validatedPaths = [];
  replay.links.forEach((link, linkIndex) => {
    const source = replayDots.find(dot => dot.id === link.sourceId);
    const target = replayDots.find(dot => dot.id === link.targetId);
    const label = `Stroke ${linkIndex + 1}`;
    if (!source || !target) { errors.push(`${label} references a missing dot.`); return; }
    if (source.id === target.id || source.pair !== target.pair || target.connected || source.connected) errors.push(`${label} does not connect an available matching pair.`);
    if (!Array.isArray(link.points) || link.points.length < 2) { errors.push(`${label} has no drawable path.`); return; }
    const first = link.points[0];
    const last = link.points[link.points.length - 1];
    if (!samePoint(first, source) || !samePoint(last, target)) errors.push(`${label} does not begin and end on its intended dots.`);
    const nextSegments = makeSegments(link.points);
    if (validatedPaths.some(path => path.segments.some(existing => nextSegments.some(next => segmentsIntersect(next.a, next.b, existing.a, existing.b)))))
      errors.push(`${label} crosses an existing connection.`);
    source.connected = true;
    target.connected = true;
    validatedPaths.push({ segments:nextSegments });
  });
  if (replayDots.some(dot => !dot.connected)) errors.push("The replay does not complete every pair.");
  return { isValid:errors.length === 0, errors };
}

window.neonLinksReplay = {
  validate(replay) { return validateReplay(replay); },
  load(replay) {
    clearGame();
    difficultyEl.value = replay.difficulty;
    pairCount = replay.dots.length / 2;
    completedLinks = 0;
    levelLabel.textContent = `Pairs: ${pairCount}`;
    replay.dots.forEach(data => {
      const x = data.x * innerWidth / replay.viewport.width;
      const y = data.y * innerHeight / replay.viewport.height;
      const el = document.createElement("div");
      el.className = "dot";
      el.style.left = `${x}px`; el.style.top = `${y}px`; el.style.color = data.color;
      el.style.background = `radial-gradient(circle at 35% 30%, white, ${data.color} 30%, #111 120%)`;
      game.appendChild(el);
      dots.push({ ...data, x, y, el, connected:false });
    });
    this.replay = replay;
    this.seek(0);
  },
  seek(timeMs, options = {}) {
    if (!this.replay) return;
      svg.innerHTML = "";
      document.querySelectorAll(".spark,.confetti").forEach(particle => particle.remove());
      overlay.classList.remove("show");
    dots.forEach(dot => {
      dot.connected = false;
      dot.el.classList.remove("connected","active","dot-explode");
      dot.el.style.opacity = ""; dot.el.style.transform = ""; dot.el.style.filter = "";
    });
      const scaleX = innerWidth / this.replay.viewport.width;
      const scaleY = innerHeight / this.replay.viewport.height;
      const speed = options.speed || 1;
      const offsetMs = options.offsetMs || 0;
    this.replay.links.forEach((link, linkIndex) => {
      const timing = options.timeline?.[linkIndex];
      const start = timing ? timing.startMs : (link.startedAtMs - offsetMs) / speed;
      const end = timing ? timing.endMs : (link.completedAtMs - offsetMs) / speed;
      const source = dots.find(dot => dot.id === link.sourceId);
      const target = dots.find(dot => dot.id === link.targetId);
      this.sparkleAt(timeMs, start, source.x, source.y, source.color, 12, link.sourceId * 101);
      link.points.forEach((point, index) => {
        const pointTime = timing ? start + (point.timeMs - link.startedAtMs) / Math.max(1, link.completedAtMs - link.startedAtMs) * (end - start) : (point.timeMs - offsetMs) / speed;
        if (index % 2 === 0) this.sparkleAt(timeMs, pointTime, point.x * scaleX, point.y * scaleY, source.color, 1, link.sourceId * 1000 + index);
      });
      this.sparkleAt(timeMs, end, target.x, target.y, target.color, 22, link.targetId * 103);
      if (timeMs < start) return;
      const progress = Math.min(1, (timeMs - start) / Math.max(1, end - start));
      const eased = options.ease === false ? progress : progress * progress * (3 - 2 * progress);
      const count = Math.max(1, Math.ceil(link.points.length * eased));
      const points = link.points.slice(0, count).map(point => ({ x:point.x * scaleX, y:point.y * scaleY }));
      const path = makePath(points, source.color, progress >= 1 ? "draw-path" : "ghost-path");
      if (progress >= 1) {
        makePath(points, source.color, "path-texture");
        dots.find(dot => dot.id === link.sourceId).el.classList.add("connected");
        dots.find(dot => dot.id === link.targetId).el.classList.add("connected");
      }
    });
    const completionMs = options.timeline?.length ? options.timeline[options.timeline.length - 1].endMs : (Math.max(...this.replay.links.map(link => link.completedAtMs)) - offsetMs) / speed;
    dots.forEach((dot, index) => this.sparkleAt(timeMs, completionMs, dot.x, dot.y, "#54f7b5", 14, 5000 + index * 107));
    game.classList.toggle("board-flash", timeMs >= completionMs && timeMs < completionMs + 800);
    const completionAge = timeMs - completionMs;
    if (completionAge >= 180) {
      svg.querySelectorAll("path").forEach(path => {
        path.style.opacity = String(Math.max(0, 1 - (completionAge - 180) / 1050));
        path.style.strokeDasharray = `${Math.max(2, 14 - completionAge / 90)} ${Math.min(22, 4 + completionAge / 70)}`;
        path.style.strokeDashoffset = String(-completionAge / 12);
      });
      dots.forEach(dot => {
        const p = Math.min(1, (completionAge - 180) / 800);
        dot.el.style.opacity = String(1 - p);
        dot.el.style.transform = `translate(-50%,-50%) scale(${1 + Math.sin(p * Math.PI) * .65 - p * .9})`;
      });
      this.confettiAt(timeMs, completionMs + 120);
    }
    locked = true;
  },
  sparkleAt(timeMs, eventMs, x, y, color, count, seed) {
    const age = timeMs - eventMs;
    if (age < 0 || age >= 760) return;
    const progress = age / 760;
    for (let index = 0; index < count; index++) {
      const value = Math.sin((seed + index + 1) * 12.9898) * 43758.5453;
      const random = value - Math.floor(value);
      const angle = random * Math.PI * 2;
      const distance = 12 + ((seed * 17 + index * 29) % 24);
      const spark = document.createElement("div");
      spark.className = "spark";
      spark.style.left = `${x}px`; spark.style.top = `${y}px`;
      spark.style.background = color; spark.style.boxShadow = `0 0 18px ${color}`;
      spark.style.animation = "none";
      spark.style.opacity = String(1 - progress);
      spark.style.transform = `translate(${Math.cos(angle) * distance * progress}px, ${Math.sin(angle) * distance * progress}px) scale(${1 - progress * .7})`;
      game.appendChild(spark);
    }
  },
  confettiAt(timeMs, eventMs) {
    const age = timeMs - eventMs;
    if (age < 0 || age >= 1650) return;
    const progress = age / 1650;
    for (let index = 0; index < 72; index++) {
      const angle = ((index * 137.5) % 360) * Math.PI / 180;
      const distance = 80 + (index * 47) % 240;
      const piece = document.createElement("div");
      piece.className = "confetti";
      piece.style.animation = "none";
      piece.style.left = `${innerWidth / 2}px`; piece.style.top = `${innerHeight * .45}px`;
      piece.style.background = colors[index % colors.length];
      piece.style.opacity = String(1 - progress);
      piece.style.transform = `translate(${Math.cos(angle) * distance * progress}px, ${Math.sin(angle) * distance * progress + 340 * progress * progress}px) rotate(${index * 31 + progress * 540}deg)`;
      game.appendChild(piece);
    }
  }
};

function replayDuration(replay) {
  if (!replay.links.length) return 1000;
  return Math.max(...replay.links.map(link => link.completedAtMs)) + 1900;
}

function scoreReplay(replay) {
  const diagonal = Math.max(1, Math.hypot(replay.viewport.width, replay.viewport.height));
  const pathLength = replay.links.reduce((sum, link) => sum + link.points.slice(1).reduce((linkSum, point, index) => {
    const previous = link.points[index];
    return linkSum + Math.hypot(point.x - previous.x, point.y - previous.y);
  }, 0), 0);
  const duration = replay.durationMs || Math.max(1, ...replay.links.map(link => link.completedAtMs));
  return pathLength / diagonal * 100 + 100000 / Math.max(1, duration);
}

function optimizeReplay(replay) {
  const optimized = structuredClone(replay);
  let cursor = 250;
  optimized.links.forEach(link => {
    const source = optimized.dots.find(dot => dot.id === link.sourceId);
    const target = optimized.dots.find(dot => dot.id === link.targetId);
    const points = link.points.filter((_, index) => index === 0 || index === link.points.length - 1 || index % 2 === 0);
    points[0] = { ...points[0], x:source.x, y:source.y };
    points[points.length - 1] = { ...points[points.length - 1], x:target.x, y:target.y };
    const duration = Math.max(320, Math.min(900, link.completedAtMs - link.startedAtMs));
    link.startedAtMs = cursor;
    link.completedAtMs = cursor + duration;
    points.forEach((point, index) => {
      point.timeMs = link.startedAtMs + (points.length <= 1 ? 0 : index / (points.length - 1)) * duration;
    });
    link.points = points;
    cursor = link.completedAtMs + 180;
  });
  return validateReplay(optimized).isValid ? optimized : replay;
}

gameRecording.registerGame({
  name:"Neon Links",
  slug:"neon-links",
  page:"Dots.html",
  scoreSolution:scoreReplay,
  optimizeSolution:optimizeReplay,
  validateSolution:validateReplay,
  loadSolution(solution) { window.neonLinksReplay.load(solution); },
  seek(timeMs, options) { window.neonLinksReplay.seek(timeMs, options); },
  getDurationMs:replayDuration,
  getAudioEvents(solution) {
    const events = [];
    solution.links.forEach(link => {
      events.push({ name:"DotGrab", timeMs:link.startedAtMs });
      events.push({ name:"DrawLoop", timeMs:link.startedAtMs, durationMs:link.completedAtMs - link.startedAtMs });
      events.push({ name:"LinkComplete", timeMs:link.completedAtMs });
    });
    if (solution.links.length) events.push({ name:"PuzzleComplete", timeMs:Math.max(...solution.links.map(link => link.completedAtMs)) });
    return events;
  }
});

function fail(title,text) {
  locked = true;
  gameAnalytics.failed("Neon Links", { difficulty: difficultyEl.value, failure_reason: title, pair_count: pairCount, links_completed: completedLinks });
  gameAudio.play('WrongLink');
  endBurst("#ff5577");
  setTimeout(() => showDialog(title, text), 850);
}

function endBurst(color) {
  game.classList.add("board-flash");
  dots.forEach(d => sparkle(d.x, d.y, color, 14));
  setTimeout(() => {
    svg.querySelectorAll("path").forEach(path => path.classList.add("path-dematerialize"));
    dots.forEach(d => d.el.classList.add("dot-explode"));
  }, 180);
  setTimeout(() => {
    for (let i = 0; i < 72; i++) {
      const angle = ((i * 137.5) % 360) * Math.PI / 180;
      const distance = 80 + (i * 47) % 240;
      const piece = document.createElement("div");
      piece.className = "confetti";
      piece.style.left = `${innerWidth / 2}px`; piece.style.top = `${innerHeight * .45}px`;
      piece.style.background = colors[i % colors.length];
      piece.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
      piece.style.setProperty("--dy", `${Math.sin(angle) * distance + 340}px`);
      piece.style.setProperty("--spin", `${i * 31 + 540}deg`);
      piece.style.setProperty("--mid-x", `${Math.cos(angle) * distance * .5}px`);
      piece.style.setProperty("--mid-y", `${Math.sin(angle) * distance * .5 + 85}px`);
      piece.style.setProperty("--mid-spin", `${(i * 31 + 540) * .5}deg`);
      game.appendChild(piece);
      setTimeout(() => piece.remove(), 1700);
    }
  }, 120);
  setTimeout(() => game.classList.remove("board-flash"), 800);
}

function showDialog(title,text) {
  dialogTitle.textContent = title;
  dialogText.textContent = text;
  overlay.classList.add("show");
}

game.addEventListener("pointerdown", pointerDown);
game.addEventListener("pointermove", pointerMove);
game.addEventListener("pointerup", pointerUp);
game.addEventListener("pointercancel", () => cleanupActivePath());
document.getElementById("newGame").addEventListener("click", newGame);
document.getElementById("again").addEventListener("click", newGame);
difficultyEl.addEventListener("change", newGame);
addEventListener("resize", () => setTimeout(newGame, 120));

if (!rendererMode) newGame();
</script>
