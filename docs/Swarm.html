<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Neon Swarm</title>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/swarm-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/swarm-180.png">
  <link rel="manifest" href="manifests/swarm.webmanifest">
  <meta name="theme-color" content="#05071c"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Neon Swarm">
  <script src="lib/url-options.js"></script>
<script src="lib/analytics.js"></script>
  <link rel="stylesheet" href="Swarm/game.css">
  <link rel="stylesheet" href="lib/top-bar/top-bar.css">
</head>
<body>
  <main id="game" aria-label="Neon Swarm game area">
    <canvas id="canvas"></canvas>
    <header data-game-topbar data-contained>
      <div class="game-topbar__identity"><h1>NEON <b>SWARM</b></h1><p class="game-topbar__instructions" id="status">Drag or use A / D to move</p></div>
      <div class="game-topbar__right"><div class="stats game-topbar__controls"><span id="score">0</span><span id="combo">x1</span></div><div class="game-topbar__utilities" data-game-topbar-utilities></div></div>
    </header>
    <section class="weapon-card" id="weaponCard">
      <span id="weaponIcon">◆</span><div><strong id="weaponName">Pulse</strong><small id="weaponDetail">Balanced auto cannon</small></div>
      <i id="weaponLevel">I</i>
    </section>
    <div class="boss-bar" id="bossBar"><label>OVERSOUL</label><i><b id="bossHp"></b></i></div>
    <section class="overlay show" id="overlay">
      <div class="dialog"><span class="eyebrow">ARCADE SURVIVAL</span><h2 id="title">Build a beautiful<br><b>arsenal.</b></h2><p id="message">Collect weapon cores to transform your firepower. Every weapon plays differently.</p><button id="start">ENTER THE SWARM</button><small>Mouse · Touch · A/D · Arrow keys</small></div>
    </section>
  </main>
  <script src="lib/top-bar/top-bar.js"></script>
  <script src="lib/audio/audio.js"></script>
  <script>gameAudio.preload(['Boss','Boss_Alt1','Primary','Primary_Alt1','Primary_Alt2','Primary_Alt3','Secondary','Secondary_Alt1','Secondary_Alt2','Streak','Pickup','Shield','Hit','GameOver','EnemyDestroyed','BossDestroyed','EnemyEscaped']);gameAudio.playSharedMusic(['Music']);</script>
  <script type="module" src="Swarm/game.js"></script>
</body>
</html>
