<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Neon Swarm</title>
<style>
:root {
  --bg0:#070a12;
  --bg1:#111827;
  --text:#eef4ff;
  --muted:#9fb0cc;
  --player:#56ccff;
  --enemy:#ff5577;
  --gun:#ffd166;
  --multi:#7cffb2;
}

* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  margin:0;
  min-height:100vh;
  overflow:hidden;
  font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,Arial;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 16%, rgba(86,204,255,.2), transparent 30%),
    radial-gradient(circle at 85% 18%, rgba(255,95,183,.17), transparent 28%),
    radial-gradient(circle at 50% 86%, rgba(124,255,178,.13), transparent 34%),
    linear-gradient(145deg,var(--bg0),var(--bg1));
}

header {
  position:fixed;
  top:18px;
  left:50%;
  width:min(430px, calc(100vw - 32px));
  transform:translateX(-50%);
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  z-index:5;
  pointer-events:none;
}

h1 {
  margin:0;
  font-size:clamp(25px,7vw,42px);
  letter-spacing:-.05em;
  line-height:.95;
}

.subtitle {
  color:var(--muted);
  font-weight:650;
  margin-top:6px;
  font-size:14px;
}

.stats {
  display:flex;
  gap:8px;
  align-items:center;
  flex-shrink:0;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.pill, button {
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.08);
  color:var(--text);
  backdrop-filter:blur(14px);
  box-shadow:0 10px 30px rgba(0,0,0,.24);
  border-radius:999px;
  padding:10px 12px;
  font-weight:800;
  font-size:13px;
}

button {
  pointer-events:auto;
  cursor:pointer;
  transition:transform .15s ease, background .15s ease;
}

button:active { transform:scale(.96); background:rgba(255,255,255,.16); }

.gear {
  width:38px;
  height:38px;
  padding:0;
  display:grid;
  place-items:center;
  font-size:19px;
}

.settings {
  position:fixed;
  top:66px;
  right:max(16px, calc((100vw - 430px) / 2));
  z-index:8;
  width:210px;
  padding:12px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(7,10,18,.68);
  backdrop-filter:blur(16px);
  box-shadow:0 20px 60px rgba(0,0,0,.42);
  display:none;
}

.settings.show { display:block; }

.settings-title {
  color:var(--muted);
  font-weight:900;
  font-size:12px;
  margin:2px 4px 10px;
  text-transform:uppercase;
  letter-spacing:.08em;
}

.difficulty-row {
  display:grid;
  grid-template-columns:1fr;
  gap:7px;
}

.difficulty {
  border-radius:16px;
  text-align:left;
  padding:10px 12px;
}

.difficulty.selected {
  background:rgba(86,204,255,.18);
  border-color:rgba(86,204,255,.45);
}

#game {
  position:fixed;
  inset:0 auto 0 50%;
  width:min(430px, 100vw);
  height:100vh;
  height:100dvh;
  transform:translateX(-50%);
  touch-action:none;
  user-select:none;
  overflow:hidden;
  border-left:1px solid rgba(255,255,255,.08);
  border-right:1px solid rgba(255,255,255,.08);
  box-shadow:0 0 80px rgba(0,0,0,.24);
}

.lane-line {
  position:absolute;
  top:0;
  bottom:0;
  width:1px;
  background:linear-gradient(180deg, transparent, rgba(255,255,255,.16), transparent);
  z-index:1;
}

.entity {
  position:absolute;
  width:34px;
  height:34px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  border:3px solid rgba(255,255,255,.9);
  z-index:3;
}

.player {
  width:30px;
  height:30px;
  color:var(--player);
  background:radial-gradient(circle at 35% 30%, white, var(--player) 30%, #111 120%);
  box-shadow:
    0 0 0 8px rgba(255,255,255,.055),
    0 0 26px currentColor,
    0 12px 34px rgba(0,0,0,.4);
  z-index:4;
}

.player::after {
  content:"";
  position:absolute;
  inset:7px;
  border-radius:50%;
  border:2px solid rgba(7,10,18,.75);
}

.enemy {
  color:var(--enemy);
  background:radial-gradient(circle at 35% 30%, white, var(--enemy) 30%, #111 120%);
  box-shadow:
    0 0 0 7px rgba(255,85,119,.08),
    0 0 24px currentColor,
    0 12px 34px rgba(0,0,0,.4);
}

.enemy.boss {
  width:54px !important;
  height:54px !important;
  border-width:4px;
  background:
    radial-gradient(circle at 35% 30%, white, #ff9ab0 22%, var(--enemy) 48%, #111 120%);
  box-shadow:
    0 0 0 10px rgba(255,85,119,.12),
    0 0 34px currentColor,
    0 14px 42px rgba(0,0,0,.46);
}

.enemy.boss::after {
  content:"BOSS";
  position:absolute;
  left:50%;
  bottom:calc(100% + 8px);
  transform:translateX(-50%);
  color:var(--text);
  background:rgba(255,85,119,.18);
  border:1px solid rgba(255,85,119,.38);
  border-radius:999px;
  padding:4px 8px;
  font-size:10px;
  font-weight:1000;
  backdrop-filter:blur(10px);
  box-shadow:0 8px 24px rgba(0,0,0,.28);
}

.pickup {
  width:36px;
  height:36px;
  display:grid;
  place-items:center;
  font-weight:1000;
  font-size:13px;
  letter-spacing:-.05em;
  text-shadow:0 1px 4px rgba(0,0,0,.75);
}

.pickup.gun {
  color:var(--gun);
  background:radial-gradient(circle at 35% 30%, white, var(--gun) 32%, #111 120%);
  box-shadow:
    0 0 0 8px rgba(255,209,102,.08),
    0 0 24px currentColor,
    0 12px 34px rgba(0,0,0,.4);
}

.pickup.multi {
  color:var(--multi);
  background:radial-gradient(circle at 35% 30%, white, var(--multi) 32%, #111 120%);
  box-shadow:
    0 0 0 8px rgba(124,255,178,.08),
    0 0 24px currentColor,
    0 12px 34px rgba(0,0,0,.4);
}

.pickup.gun::before {
  content:attr(data-label);
  position:absolute;
  left:50%;
  bottom:calc(100% + 8px);
  transform:translateX(-50%);
  white-space:nowrap;
  color:var(--text);
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.14);
  border-radius:999px;
  padding:4px 8px;
  font-size:11px;
  font-weight:900;
  backdrop-filter:blur(10px);
  box-shadow:0 8px 24px rgba(0,0,0,.28);
}

.pickup.gun::after {
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width:15px;
  height:5px;
  transform:translate(-50%,-50%);
  border-radius:999px;
  background:rgba(7,10,18,.72);
  box-shadow:8px 3px 0 -1px rgba(7,10,18,.72), -5px 6px 0 -2px rgba(7,10,18,.72);
}

.pickup.multi::after {
  content:"";
  position:absolute;
  inset:6px;
  border-radius:50%;
  border:2px dashed rgba(7,10,18,.72);
}

.projectile {
  position:absolute;
  width:5px;
  height:14px;
  border-radius:999px;
  transform:translate(-50%,-50%);
  background:var(--player);
  box-shadow:0 0 12px var(--player), 0 0 3px white inset;
  z-index:2;
}

.spark {
  position:absolute;
  width:7px;
  height:7px;
  border-radius:50%;
  pointer-events:none;
  z-index:6;
  background:white;
  box-shadow:0 0 16px white;
  animation:spark .72s ease-out forwards;
}

@keyframes spark {
  to {
    opacity:0;
    transform:translate(var(--dx),var(--dy)) scale(0);
  }
}

.trail {
  position:absolute;
  width:5px;
  height:5px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:2;
  background:var(--player);
  box-shadow:0 0 14px var(--player);
  animation:fade .45s linear forwards;
}

@keyframes fade {
  to { opacity:0; transform:translate(-50%,-50%) scale(.1); }
}

.overlay {
  position:fixed;
  inset:0;
  display:grid;
  place-items:center;
  background:rgba(2,5,12,.38);
  backdrop-filter:blur(9px);
  opacity:0;
  pointer-events:none;
  z-index:10;
  transition:opacity .35s ease;
}

.overlay.show {
  opacity:1;
  pointer-events:auto;
}

.dialog {
  width:min(430px,calc(100vw - 34px));
  padding:30px;
  border-radius:30px;
  text-align:center;
  border:1px solid rgba(255,255,255,.18);
  background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.07));
  box-shadow:0 30px 90px rgba(0,0,0,.52);
  transform:translateY(18px) scale(.96);
  transition:transform .35s cubic-bezier(.2,1.3,.2,1);
}

.overlay.show .dialog { transform:translateY(0) scale(1); }

.dialog h2 {
  margin:0 0 8px;
  font-size:34px;
  letter-spacing:-.04em;
}

.dialog p {
  margin:0 0 22px;
  color:var(--muted);
  line-height:1.45;
}

.board-flash { animation:endFlash .75s ease; }

@keyframes endFlash {
  0% { filter:brightness(1); }
  45% { filter:brightness(1.75) saturate(1.5); }
  100% { filter:brightness(1); }
}

@media (max-width:620px) {
  header {
    top:14px;
    width:calc(100vw - 24px);
  }
  .settings {
    right:12px;
  }
  .subtitle { max-width:190px; }
  .stats { max-width:180px; }
  .pill { padding:9px 10px; font-size:12px; }
  .hide-small { display:none; }
}
</style>
</head>
<body>
<header>
  <div>
    <h1>Neon Swarm</h1>
    <div class="subtitle">Two lanes. Dodge enemies. Grab upgrades.</div>
  </div>
  <div class="stats">
    <div class="pill" id="timer">0.0s</div>
    <div class="pill" id="kills">Kills: 0</div>
    <div class="pill hide-small" id="squad">Players: 1</div>
    <button id="settingsButton" class="gear" aria-label="Difficulty">⚙</button>
    <button id="newGame">New</button>
  </div>
</header>

<div class="settings" id="settingsPanel">
  <div class="settings-title">Difficulty</div>
  <div class="difficulty-row">
    <button class="difficulty" data-difficulty="easy">Easy · chill</button>
    <button class="difficulty selected" data-difficulty="normal">Normal · balanced</button>
    <button class="difficulty" data-difficulty="hard">Hard · spicy</button>
  </div>
</div>

<div id="game"></div>

<div class="overlay" id="overlay">
  <div class="dialog">
    <h2 id="dialogTitle">Swarmed</h2>
    <p id="dialogText"></p>
    <button id="again">Play again</button>
  </div>
</div>

<script>
const game = document.getElementById("game");
const overlay = document.getElementById("overlay");
const timerEl = document.getElementById("timer");
const killsEl = document.getElementById("kills");
const squadEl = document.getElementById("squad");
const dialogText = document.getElementById("dialogText");

let players = [];
let enemies = [];
let pickups = [];
let projectiles = [];
let lanes = [];
let dragging = false;
let targetX = 0;
let playerX = 0;
let currentLane = 0;
const laneCount = 2;
let startedAt = 0;
let lastFrame = 0;
let lastShot = 0;
let lastSpawn = 0;
let kills = 0;
let weaponLevel = 1;
let running = false;
let raf = 0;
let seed = Math.floor(Math.random() * 2147483647);
let difficulty = "normal";
const difficultyConfig = {
  easy:{ spawn:1.15, speed:.88, density:.75, boss:1.35, pickup:1.2 },
  normal:{ spawn:1, speed:1, density:1, boss:1, pickup:1 },
  hard:{ spawn:.82, speed:1.16, density:1.28, boss:.72, pickup:.78 }
};

function rand() {
  seed = (seed * 48271) % 2147483647;
  return seed / 2147483647;
}

function random(min,max) { return rand() * (max - min) + min; }
function clamp(v,min,max) { return Math.max(min, Math.min(max, v)); }
function distance(a,b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function makeEl(cls) {
  const el = document.createElement("div");
  el.className = cls;
  game.appendChild(el);
  return el;
}

function setPos(el,x,y) {
  el.style.left = `${x}px`;
  el.style.top = `${y}px`;
}

function clearGame() {
  cancelAnimationFrame(raf);
  [...players, ...enemies, ...pickups, ...projectiles].forEach(o => o.el.remove());
  lanes.forEach(el => el.remove());
  document.querySelectorAll(".spark,.trail").forEach(s => s.remove());
  players = [];
  enemies = [];
  pickups = [];
  projectiles = [];
  lanes = [];
  kills = 0;
  weaponLevel = 1;
  dragging = false;
  running = false;
  overlay.classList.remove("show");
  game.classList.remove("board-flash");
}

function newGame() {
  clearGame();
  seed = Math.floor(Math.random() * 2147483647);
  currentLane = 0;
  playerX = laneX(currentLane);
  targetX = playerX;
  startedAt = performance.now();
  lastFrame = startedAt;
  lastShot = startedAt;
  lastSpawn = startedAt;
  running = true;
  makeLanes();
  addPlayer(0);
  updateHud(0);
  raf = requestAnimationFrame(loop);
}

function makeLanes() {
  for (let i = 1; i < laneCount; i++) {
    const el = document.createElement("div");
    el.className = "lane-line";
    el.style.left = `${gameWidth() * i / laneCount}px`;
    game.appendChild(el);
    lanes.push(el);
  }
}

function gameWidth() {
  return game.clientWidth;
}

function gameHeight() {
  return game.clientHeight;
}

function laneX(lane) {
  return gameWidth() * (lane + .5) / laneCount;
}

function nearestLane(x) {
  return x < gameWidth() / 2 ? 0 : 1;
}

function addPlayer(offset) {
  const el = makeEl("entity player");
  const player = { x:playerX + offset, y:gameHeight() - 86, offset, r:15, el, alive:true, phase:random(0, Math.PI * 2) };
  players.push(player);
  setPos(el, player.x, player.y);
  sparkle(player.x, player.y, "#56ccff", 18);
}

function spawnEnemy(t) {
  const cfg = difficultyConfig[difficulty];
  const bossDue = t > 10 && rand() < Math.min(.38, (0.035 + t * .0025) / cfg.boss);
  const density = Math.min(0.42, 0.08 + t * 0.004) * cfg.density;
  const count = bossDue ? 1 : (rand() < density ? 2 : 1);

  for (let i = 0; i < count; i++) {
    const lane = Math.floor(random(0, laneCount));
    const size = bossDue ? 54 : random(28, 42);
    const el = makeEl(`entity enemy${bossDue ? " boss" : ""}`);
    const enemy = {
      boss:bossDue,
      x:laneX(lane),
      y:-50 - random(0, 80),
      vx:0,
      speed:(bossDue ? random(142, 180) + t * 1.75 : random(82, 118) + t * 1.45) * cfg.speed,
      hp:bossDue ? Math.ceil(10 + t * .6 + weaponLevel * 1.4) : Math.ceil(1 + t / 24 + random(0, weaponLevel * .25)),
      r:size / 2,
      el
    };
    el.style.width = `${size}px`;
    el.style.height = `${size}px`;
    enemies.push(enemy);
    setPos(el, enemy.x, enemy.y);

    if (bossDue && rand() < .72) spawnDilemmaPickup(t, lane);
  }

  if (!bossDue && rand() < 0.08 * cfg.pickup) spawnPickup(t);
}
function spawnPickup(t) {
  const isGun = rand() < 0.72;
  const el = makeEl(`entity pickup ${isGun ? "gun" : "multi"}`);
  el.textContent = isGun ? "" : "x2";
  if (isGun) el.dataset.label = weaponName();
  const pickup = {
    type:isGun ? "gun" : "multi",
    x:laneX(Math.floor(random(0, laneCount))),
    y:-48,
    speed:95 + t * 1.4,
    r:18,
    el
  };
  pickups.push(pickup);
  setPos(el, pickup.x, pickup.y);
}

function spawnDilemmaPickup(t, dangerLane) {
  const isGun = rand() < .8;
  const el = makeEl(`entity pickup ${isGun ? "gun" : "multi"}`);
  el.textContent = isGun ? "" : "x2";
  if (isGun) el.dataset.label = weaponName();

  const pickup = {
    type:isGun ? "gun" : "multi",
    x:laneX(dangerLane),
    y:random(90, 170),
    speed:95 + t * 1.25,
    r:18,
    el
  };
  pickups.push(pickup);
  setPos(el, pickup.x, pickup.y);
}

function weaponName() {
  if (weaponLevel < 3) return "machine gun";
  if (weaponLevel < 6) return "burst gun";
  if (weaponLevel < 10) return "pulse rifle";
  if (weaponLevel < 15) return "rail gun";
  return "star cannon";
}

function shoot(now) {
  const alive = players.filter(p => p.alive);
  if (alive.length === 0) return;
  const fireRate = Math.max(180, 330 - weaponLevel * 10);
  if (now - lastShot < fireRate) return;

  lastShot = now;
  const spread = Math.min(1, Math.floor((weaponLevel - 1) / 5));
  alive.forEach(player => {
    for (let i = -spread; i <= spread; i++) {
      const el = makeEl("projectile");
      const projectile = {
        x:player.x + i * 6,
        y:player.y - 20,
        vx:i * 18,
        speed:820 + weaponLevel * 38,
        damage:1 + Math.floor(weaponLevel / 4),
        r:4,
        el
      };
      projectiles.push(projectile);
      setPos(el, projectile.x, projectile.y);
    }
  });
}

function loop(now) {
  if (!running) return;
  const dt = Math.min(0.033, (now - lastFrame) / 1000);
  lastFrame = now;
  const t = (now - startedAt) / 1000;

  updateHud(t);
  updatePlayers(dt, now);
  updateSpawns(now, t);
  shoot(now);
  updateEnemies(dt);
  updatePickups(dt);
  updateProjectiles(dt);
  collisions(t);

  raf = requestAnimationFrame(loop);
}

function updateHud(t) {
  timerEl.textContent = `${t.toFixed(1)}s`;
  killsEl.textContent = `Kills: ${kills}`;
  squadEl.textContent = `Players: ${players.filter(p => p.alive).length}`;
}

function updatePlayers(dt, now) {
  playerX += (targetX - playerX) * Math.min(1, dt * 12);
  const alive = players.filter(p => p.alive);
  const spacing = 20;
  const start = -(alive.length - 1) * spacing / 2;

  alive.forEach((p, i) => {
    p.offset += ((start + i * spacing) - p.offset) * Math.min(1, dt * 8);
    p.x = clamp(playerX + p.offset, 24, gameWidth() - 24);
    p.y = gameHeight() - 78 + Math.sin(now * .006 + p.phase) * 2.5;
    setPos(p.el, p.x, p.y);

    if (Math.random() < .25) makeTrail(p.x, p.y + 14, "#56ccff");
  });
}

function updateSpawns(now, t) {
  const cfg = difficultyConfig[difficulty];
  const interval = Math.max(310, (980 - t * 9) * cfg.spawn);
  if (now - lastSpawn > interval) {
    lastSpawn = now;
    spawnEnemy(t);
  }
}

function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed * dt;
    setPos(e.el, e.x, e.y);
    if (e.y > gameHeight() + 80) remove(enemies, i);
  }
}

function updatePickups(dt) {
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.y += p.speed * dt;
    setPos(p.el, p.x, p.y);
    if (p.y > gameHeight() + 80) remove(pickups, i);
  }
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.y -= p.speed * dt;
    p.x += p.vx * dt;
    setPos(p.el, p.x, p.y);
    if (p.y < -40 || p.x < -40 || p.x > gameWidth() + 40) remove(projectiles, i);
  }
}

function collisions(t) {
  for (let pi = projectiles.length - 1; pi >= 0; pi--) {
    const p = projectiles[pi];
    let hit = false;
    for (let ei = enemies.length - 1; ei >= 0 && !hit; ei--) {
      const e = enemies[ei];
      if (distance(p, e) < p.r + e.r) {
        e.hp -= p.damage;
        sparkle(p.x, p.y, "#56ccff", 9);
        remove(projectiles, pi);
        hit = true;
        if (e.hp <= 0) {
          sparkle(e.x, e.y, e.boss ? "#ffd166" : "#ff5577", e.boss ? 44 : 20);
          kills += e.boss ? 5 : 1;
          remove(enemies, ei);
          weaponLevel = Math.max(weaponLevel, 1 + Math.floor(t / 9));
        }
      }
    }
  }

  const alive = players.filter(p => p.alive);

  for (let i = pickups.length - 1; i >= 0; i--) {
    const pickup = pickups[i];
    const player = alive.find(p => distance(p, pickup) < p.r + pickup.r);
    if (!player) continue;

    if (pickup.type === "gun") {
      weaponLevel += 1;
      sparkle(pickup.x, pickup.y, "#ffd166", 26);
    } else {
      const count = Math.min(4, players.filter(p => p.alive).length + 1);
      while (players.filter(p => p.alive).length < count) addPlayer(random(-55, 55));
      sparkle(pickup.x, pickup.y, "#7cffb2", 28);
    }

    remove(pickups, i);
  }

  for (let ei = enemies.length - 1; ei >= 0; ei--) {
    const enemy = enemies[ei];
    const player = players.find(p => p.alive && distance(p, enemy) < p.r + enemy.r);
    if (!player) continue;

    player.alive = false;
    player.el.remove();
    sparkle(player.x, player.y, "#ff5577", 34);
    sparkle(enemy.x, enemy.y, "#ff5577", 18);
    remove(enemies, ei);

    if (players.every(p => !p.alive)) endGame();
  }
}

function remove(array, index) {
  array[index].el.remove();
  array.splice(index, 1);
}

function makeTrail(x,y,color) {
  const el = document.createElement("div");
  el.className = "trail";
  el.style.left = `${x}px`;
  el.style.top = `${y}px`;
  el.style.background = color;
  el.style.boxShadow = `0 0 14px ${color}`;
  game.appendChild(el);
  setTimeout(() => el.remove(), 460);
}

function sparkle(x,y,color,count) {
  for (let i = 0; i < count; i++) {
    const s = document.createElement("div");
    s.className = "spark";
    s.style.left = `${x}px`;
    s.style.top = `${y}px`;
    s.style.background = color;
    s.style.boxShadow = `0 0 18px ${color}`;
    s.style.setProperty("--dx", `${random(-38,38)}px`);
    s.style.setProperty("--dy", `${random(-38,38)}px`);
    game.appendChild(s);
    setTimeout(() => s.remove(), 760);
  }
}

function pointerDown(e) {
  dragging = true;
  const localX = e.clientX - game.getBoundingClientRect().left;
  currentLane = nearestLane(localX);
  targetX = laneX(currentLane);
  try { game.setPointerCapture(e.pointerId); } catch {}
}

function pointerMove(e) {
  if (!dragging || !running) return;
  const localX = e.clientX - game.getBoundingClientRect().left;
  currentLane = nearestLane(localX);
  targetX = laneX(currentLane);
}

function pointerUp() {
  dragging = false;
}

function endGame() {
  running = false;
  cancelAnimationFrame(raf);
  game.classList.add("board-flash");
  setTimeout(() => game.classList.remove("board-flash"), 800);
  const survived = ((performance.now() - startedAt) / 1000).toFixed(1);
  dialogText.textContent = `You survived ${survived}s on ${difficulty}, destroyed ${kills} enemies, and reached weapon level ${weaponLevel}.`;
  setTimeout(() => overlay.classList.add("show"), 850);
}

game.addEventListener("pointerdown", pointerDown);
game.addEventListener("pointermove", pointerMove);
game.addEventListener("pointerup", pointerUp);
game.addEventListener("pointercancel", pointerUp);
document.getElementById("newGame").addEventListener("click", newGame);
document.getElementById("again").addEventListener("click", newGame);
document.getElementById("settingsButton").addEventListener("click", () => document.getElementById("settingsPanel").classList.toggle("show"));
document.querySelectorAll(".difficulty").forEach(button => button.addEventListener("click", () => {
  difficulty = button.dataset.difficulty;
  document.querySelectorAll(".difficulty").forEach(b => b.classList.toggle("selected", b === button));
  document.getElementById("settingsPanel").classList.remove("show");
  newGame();
}));
addEventListener("resize", () => setTimeout(newGame, 120));

newGame();
</script>
</body>
</html>
