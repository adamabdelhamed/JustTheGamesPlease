<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Neon Swarm</title>
  <link rel="stylesheet" href="Swarm/game.css">
</head>
<body>
  <main id="game" aria-label="Neon Swarm game area">
    <canvas id="canvas"></canvas>
    <header>
      <div><h1>NEON <b>SWARM</b></h1><p id="status">Drag or use A / D to move</p></div>
      <div class="stats"><span id="score">0</span><span id="combo">x1</span><button id="sound" aria-label="Toggle sound">♪</button></div>
    </header>
    <section class="weapon-card" id="weaponCard">
      <span id="weaponIcon">◆</span><div><strong id="weaponName">Pulse</strong><small id="weaponDetail">Balanced auto cannon</small></div>
      <i id="weaponLevel">I</i>
    </section>
    <div class="boss-bar" id="bossBar"><label>OVERSOUL</label><i><b id="bossHp"></b></i></div>
    <section class="overlay show" id="overlay">
      <div class="dialog"><span class="eyebrow">ARCADE SURVIVAL</span><h2 id="title">Build a beautiful<br><b>arsenal.</b></h2><p id="message">Collect weapon cores to transform your firepower. Every weapon plays differently.</p><button id="start">ENTER THE SWARM</button><small>Mouse · Touch · A/D · Arrow keys</small></div>
    </section>
  </main>
  <script src="Swarm/game.js"></script>
</body>
</html>
